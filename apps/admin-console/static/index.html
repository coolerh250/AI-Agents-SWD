<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Console v0 — read-only</title>
  <style>
    :root { --bg:#0f1419; --card:#1b232b; --fg:#e6edf3; --muted:#8b949e; --ok:#2ea043; --warn:#d29922; --bad:#f85149; --line:#30363d; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--fg); }
    header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; }
    header h1 { font-size:16px; margin:0; }
    .ro { font-size:11px; color:var(--bg); background:var(--muted); border-radius:10px; padding:2px 8px; }
    nav { display:flex; flex-wrap:wrap; gap:6px; padding:10px 20px; border-bottom:1px solid var(--line); }
    nav button { background:var(--card); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:6px 10px; cursor:pointer; font-size:13px; }
    nav button.active { border-color:#388bfd; }
    main { padding:20px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:14px; }
    .card .k { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    .card .v { font-size:20px; margin-top:6px; word-break:break-word; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { color:var(--muted); font-weight:600; }
    .badge { display:inline-block; border-radius:10px; padding:2px 8px; font-size:12px; }
    .b-ok { background:rgba(46,160,67,.2); color:#56d364; }
    .b-warn { background:rgba(210,153,34,.2); color:#e3b341; }
    .b-bad { background:rgba(248,81,73,.2); color:#ff7b72; }
    .b-neutral { background:rgba(139,148,158,.2); color:#adbac7; }
    .empty, .error { color:var(--muted); padding:24px; text-align:center; border:1px dashed var(--line); border-radius:8px; }
    .error { color:#ff7b72; border-color:#5a2a2a; }
    h2 { font-size:15px; margin:0 0 12px; }
    pre { background:#0d1117; border:1px solid var(--line); border-radius:6px; padding:12px; overflow:auto; font-size:12px; }
    .note { color:var(--muted); font-size:12px; margin-top:8px; }
    .disabled-action { opacity:.5; cursor:not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Admin Console v0</h1>
    <span class="ro" title="Operator actions are disabled in Admin Console v0.">READ-ONLY</span>
    <span id="safety-pill"></span>
  </header>
  <nav id="nav"></nav>
  <main id="main"><div class="empty">Loading…</div></main>

  <script>
  // ---- read-only API client: GET only. No POST/PUT/PATCH/DELETE anywhere. ----
  const API_BASE = (window.OPERATIONS_API_BASE_URL || "").replace(/\/$/, "");
  async function apiGet(path) {
    const res = await fetch(API_BASE + path, { method: "GET", headers: { "Accept": "application/json" } });
    if (res.status === 404) { const e = new Error("not_available"); e.code = 404; throw e; }
    if (!res.ok) throw new Error("http_" + res.status);
    return res.json();
  }

  // ---- secret / chain-of-thought redaction ----
  const SECRET_KEYS = ["token","secret","password","api_key","apikey","hmac","private_key","webhook"];
  const FORBIDDEN_KEYS = ["chain_of_thought","raw_prompt","transcript"];
  function redact(value) {
    if (Array.isArray(value)) return value.map(redact);
    if (value && typeof value === "object") {
      const out = {};
      for (const [k, v] of Object.entries(value)) {
        const lk = k.toLowerCase();
        if (FORBIDDEN_KEYS.some(f => lk.includes(f))) continue;
        if (SECRET_KEYS.some(s => lk.includes(s))) { out[k] = "***REDACTED***"; continue; }
        out[k] = redact(v);
      }
      return out;
    }
    return value;
  }
  window.__adminConsole = { redact, SECRET_KEYS, FORBIDDEN_KEYS };

  function badge(text) {
    const t = String(text == null ? "—" : text);
    let cls = "b-neutral";
    if (/(passed|safe|completed|ok|true)/i.test(t)) cls = "b-ok";
    if (/(pending|passed_with_findings|warning|with_documented_gaps|needs_changes|draft)/i.test(t)) cls = "b-warn";
    if (/(ready_for_review|ready_for_operator_review)/i.test(t)) cls = "b-ok";
    if (/(failed|blocked|unsafe|error|rejected)/i.test(t)) cls = "b-bad";
    return `<span class="badge ${cls}">${esc(t)}</span>`;
  }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
  function card(k, v) { return `<div class="card"><div class="k">${esc(k)}</div><div class="v">${v}</div></div>`; }
  function kvTable(obj) {
    const o = redact(obj || {});
    const rows = Object.entries(o).map(([k,v]) =>
      `<tr><th>${esc(k)}</th><td>${typeof v === "object" ? `<pre>${esc(JSON.stringify(v,null,2))}</pre>` : badge(v)}</td></tr>`).join("");
    return `<table>${rows}</table>`;
  }
  function emptyState(msg) { return `<div class="empty">${esc(msg || "No data available")}</div>`; }
  function errorState(e) {
    if (e && e.code === 404) return `<div class="empty">Not available in this environment</div>`;
    return `<div class="error">Unable to load data (${esc(e && e.message || "error")})</div>`;
  }

  // ---- pages (all read-only) ----
  const PAGES = [
    { id:"overview", label:"Executive Overview", render: renderOverview },
    { id:"projects", label:"Projects", render: renderProjects },
    { id:"delivery", label:"Delivery Package", render: renderDelivery },
    { id:"safety", label:"Safety Center", render: renderSafety },
    { id:"regression", label:"Regression", render: renderRegression },
    { id:"cost", label:"Cost / LLM", render: renderCost },
    { id:"incidents", label:"Incidents", render: renderIncidents },
    { id:"runtime", label:"Runtime Baseline", render: renderRuntime },
    { id:"identity", label:"Identity Posture", render: renderIdentity },
    { id:"secrets", label:"Secret Posture", render: renderSecrets },
    { id:"security", label:"Security / Supply Chain", render: renderSecurity },
    { id:"multiproject", label:"Multi-project Delivery", render: renderMultiProject },
  ];

  async function renderOverview(el) {
    const d = await apiGet("/operations/admin-console/overview");
    el.innerHTML = `<h2>Executive Overview</h2><div class="grid">
      ${card("Active projects", esc(d.active_projects_count))}
      ${card("Delivery packages", esc(d.delivery_packages_count))}
      ${card("Ready for review", esc(d.ready_for_review_packages_count))}
      ${card("Latest pilot", badge(d.latest_mini_delivery_pilot_status))}
      ${card("Latest package", badge(d.latest_delivery_package_status))}
      ${card("Acceptance gate", badge(d.latest_acceptance_gate_decision))}
      ${card("Human acceptance", badge(d.latest_human_acceptance_status))}
      ${card("Safety", badge(d.safety_result))}
      ${card("Production executed", badge(d.production_executed_true_count))}
      ${card("Full regression", badge(d.latest_full_regression_status))}
      ${card("Ready for admin console", badge(d.delivery_package_ready_for_admin_console))}
      ${card("Backup gaps", esc((d.backup_readiness_gaps||[]).join(", ") || "none"))}
    </div>
    <p class="note">Operator actions are disabled in Admin Console v0.</p>`;
  }
  // Step 57 -- read-only multi-project delivery & work-item dispatch fallback view.
  // The static fallback is read-only; mutations (create/dispatch) are in the React app.
  // NO production deploy / GitHub PR / ArgoCD sync / external send / production-ready control.
  async function renderMultiProject(el) {
    let projects = null, safety = null;
    try { projects = await apiGet("/operations/delivery/projects"); } catch (_e) { projects = null; }
    try { safety = await apiGet("/operations/safety"); } catch (_e) { safety = null; }
    const list = (projects && projects.projects) || [];
    const rows = list.map(p => `<tr><td>${esc(p.project_key)}</td><td>${esc(p.name)}</td>
      <td>${badge(p.registry_status)}</td><td>${esc(p.environment_scope)}</td>
      <td>${badge(p.production_allowed)}</td></tr>`).join("");
    el.innerHTML = `<h2>Multi-project Delivery &amp; Work-item Dispatch (Step 57)</h2>
      <p class="note">Non-production multi-project delivery and work-item dispatch. Dispatch never triggers GitHub write, ArgoCD sync, external notification send, or any production action; production_effect work items route to waiting_approval. This fallback view is read-only and has NO production deploy / GitHub PR / ArgoCD sync / external send / production-ready control. Claude Code does not decide production readiness.</p>
      <div class="grid">
        ${card("Multi-project enabled", badge(safety && safety.multi_project_enabled))}
        ${card("Work-item dispatch enabled", badge(safety && safety.work_item_dispatch_enabled))}
        ${card("Dispatch GitHub write", badge(safety && safety.work_item_dispatch_github_write_enabled))}
        ${card("Dispatch ArgoCD sync", badge(safety && safety.work_item_dispatch_argocd_sync_enabled))}
        ${card("Dispatch production action", badge(safety && safety.work_item_dispatch_production_action_enabled))}
        ${card("Notification external send", badge(safety && safety.work_item_notification_external_send_enabled))}
        ${card("Production ready", badge(safety && safety.multi_project_production_ready))}
      </div>
      <h2 style="margin-top:20px">Projects</h2>
      ${rows ? `<table><tr><th>Key</th><th>Name</th><th>Status</th><th>Env</th><th>Production allowed</th></tr>${rows}</table>` : emptyState("No delivery projects yet")}`;
  }
  async function renderProjects(el) {
    const d = await apiGet("/operations/admin-console/projects");
    if (!d.projects || !d.projects.length) return void (el.innerHTML = "<h2>Projects</h2>" + emptyState("No projects yet"));
    const rows = d.projects.map(p => `<tr>
      <td>${esc(p.title)}</td><td>${badge(p.status)}</td><td>${badge(p.risk_level)}</td>
      <td>${badge(p.autonomy_level)}</td><td>${badge(p.latest_pilot_status)}</td>
      <td>${badge(p.latest_delivery_package_status)}</td><td>${badge(p.readiness_status)}</td>
      <td>${badge(p.human_acceptance_status)}</td></tr>`).join("");
    el.innerHTML = `<h2>Projects</h2><table><tr><th>Title</th><th>Status</th><th>Risk</th><th>Autonomy</th><th>Pilot</th><th>Package</th><th>Readiness</th><th>Human acceptance</th></tr>${rows}</table>`;
  }
  async function renderDelivery(el) {
    const d = await apiGet("/operations/admin-console/latest-delivery-state");
    if (!d.latest_delivery_package) return void (el.innerHTML = "<h2>Delivery Package / Acceptance Gate</h2>" + emptyState("No delivery package yet"));
    el.innerHTML = `<h2>Delivery Package / Acceptance Gate</h2>
      <div class="grid">
        ${card("Package status", badge(d.latest_delivery_package.status))}
        ${card("Gate status", badge((d.acceptance_gate||{}).status))}
        ${card("Gate decision", badge((d.acceptance_gate||{}).decision))}
        ${card("Human acceptance", badge(d.human_acceptance_status))}
        ${card("Readiness", badge((d.readiness_snapshot||{}).readiness_status))}
      </div>
      <p class="note">Accept / reject / request-changes are a future Admin Console v1 feature and are disabled here.</p>
      <h2 style="margin-top:20px">Acceptance gate</h2>${kvTable(d.acceptance_gate)}`;
  }
  async function renderSafety(el) {
    const d = await apiGet("/operations/admin-console/safety-summary");
    el.innerHTML = `<h2>Safety Center</h2>${kvTable(d)}`;
  }
  async function renderRegression(el) {
    const d = await apiGet("/operations/admin-console/regression-summary");
    el.innerHTML = `<h2>Regression / Verification</h2>${kvTable(d)}`;
  }
  async function renderCost(el) {
    const d = await apiGet("/operations/admin-console/overview");
    const llm = d.llm_summary || {};
    if (!llm.total_interactions && !llm.total_proposals) return void (el.innerHTML = "<h2>Cost / LLM Governance</h2>" + emptyState("No usage data available"));
    el.innerHTML = `<h2>Cost / LLM Governance</h2>${kvTable(llm)}`;
  }
  async function renderIncidents(el) {
    const d = await apiGet("/operations/admin-console/overview");
    const inc = d.incidents_summary || {};
    el.innerHTML = `<h2>Incidents</h2>${kvTable(inc)}`;
  }

  // Read-only Kubernetes / Helm / GitOps runtime baseline. GET-only; NO deploy,
  // sync, apply, install, or any mutation control is rendered here.
  async function renderRuntime(el) {
    const d = await apiGet("/operations/runtime/report");
    const area = d.area_status || d.areaStatus || {};
    const prod = d.production_safety || d.productionSafety || {};
    const facts = d.safety_facts || d.safetyFacts || {};
    const ms = d.marker_summary || d.markerSummary || {};
    const limits = d.limitations || [];
    const envs = d.environments || [];
    const envRows = envs.map(e => `<tr><td>${esc(e.name)}</td><td>${badge(e.active)}</td>
      <td>${badge(e.disabled)}</td><td>${badge(e.production)}</td>
      <td>${badge(e.automatedSync)}</td><td>${esc(e.valuesFile)}</td></tr>`).join("");
    let smokeReadiness = null, smokePreflight = null, smokeReport = null;
    try { smokeReadiness = await apiGet("/operations/runtime/nonprod-smoke/readiness"); } catch (_e) { smokeReadiness = null; }
    try { smokePreflight = await apiGet("/operations/runtime/nonprod-smoke/preflight"); } catch (_e) { smokePreflight = null; }
    try { smokeReport = await apiGet("/operations/runtime/nonprod-smoke/report"); } catch (_e) { smokeReport = null; }
    let argocdSafety = null, argocdSync = null;
    try { argocdSafety = await apiGet("/operations/gitops/nonprod-argocd/safety"); } catch (_e) { argocdSafety = null; }
    try { argocdSync = await apiGet("/operations/gitops/nonprod-argocd/sync"); } catch (_e) { argocdSync = null; }
    const argocdBlock = argocdSafety ? `
      <h2 style="margin-top:20px">Non-production ArgoCD Manual Sync (Step 56)</h2>
      <p class="note">Read-only non-production ArgoCD manual sync — NOT production GitOps / ArgoCD ready. NO sync / install / delete / rollback / promote control, no auto-sync / prune / self-heal toggle, no namespace / secret input, no production-ready toggle. Manual sync only; the live runtime sync report is never committed.</p>
      <div class="grid">
        ${card("ArgoCD installed", badge(argocdSafety.nonprod_argocd_installed))}
        ${card("ArgoCD namespace", esc(argocdSafety.nonprod_argocd_namespace))}
        ${card("Destination namespace", esc(argocdSafety.nonprod_argocd_destination_namespace))}
        ${card("Manual sync succeeded", badge(argocdSafety.nonprod_argocd_manual_sync_succeeded))}
        ${card("Last sync status", esc((argocdSync && argocdSync.lastSyncStatus) || "not_run"))}
        ${card("Last health status", esc((argocdSync && argocdSync.lastHealthStatus) || "not_run"))}
        ${card("Auto-sync enabled", badge(argocdSafety.nonprod_argocd_auto_sync_enabled))}
        ${card("Prune enabled", badge(argocdSafety.nonprod_argocd_prune_enabled))}
        ${card("Self-heal enabled", badge(argocdSafety.nonprod_argocd_self_heal_enabled))}
        ${card("Production namespace touched", badge(argocdSafety.nonprod_argocd_production_namespace_touched))}
        ${card("Public ingress enabled", badge(argocdSafety.nonprod_argocd_public_ingress_enabled))}
        ${card("LoadBalancer enabled", badge(argocdSafety.nonprod_argocd_loadbalancer_enabled))}
        ${card("Production ready", badge(false))}
      </div>
      <p class="note">Non-production manual sync only; auto-sync disabled. NOT production GitOps / ArgoCD readiness. Step 57 (Multi-project Delivery Capability &amp; Work-item Dispatch) is still required. Claude Code does not decide Production readiness.</p>` : "";
    const smokeBlockers = (smokeReadiness && smokeReadiness.blockers) || [];
    const smokeNext = (smokeReadiness && smokeReadiness.requiredNextSteps) || [];
    const smokeBlock = smokeReadiness ? `
      <h2 style="margin-top:20px">Non-production Runtime Smoke (Step 55)</h2>
      <p class="note">Read-only non-production Kubernetes runtime smoke — framework ready, NOT production-enforced. No deploy / Helm install / cleanup / kubectl exec / ArgoCD sync control; no namespace / secret input; no production-ready toggle. When no safe non-production cluster exists the smoke is BLOCKED (never faked). Runtime smoke reports are never committed (status not_run here).</p>
      <div class="grid">
        ${card("Smoke status", badge(smokeReadiness.status))}
        ${card("Cluster access detected", badge(smokeReadiness.clusterAccessDetected))}
        ${card("Namespace", esc(smokeReadiness.namespace))}
        ${card("Preflight", badge((smokePreflight && smokePreflight.status) || "not_run"))}
        ${card("Helm smoke", badge((smokeReport && smokeReport.status) || "not_run"))}
        ${card("Production ready", badge(smokeReadiness.productionReady))}
      </div>
      <h2 style="margin-top:20px">Blockers / Step 56 dependency</h2>
      <p class="note">Step 56 (real ArgoCD non-production manual sync) and Step 60 (production readiness review) are still required. Claude Code does not decide Production readiness.</p>
      <ul>${smokeBlockers.map(b => `<li>${esc(b)}</li>`).join("")}
          ${smokeNext.map(s => `<li>${esc(s)}</li>`).join("")}</ul>${argocdBlock}` : argocdBlock;
    el.innerHTML = `<h2>Kubernetes / Helm / GitOps Runtime Baseline</h2>
      <p class="note">Read-only static baseline — no cluster connected, no deploy, no Helm install, no ArgoCD sync. This view provides NO deploy / sync / apply / install control.</p>
      <div class="grid">
        ${card("Runtime status", badge(d.status))}
        ${card("Production ready", badge(prod.productionReady))}
        ${card("Validated not deployed", badge(prod.validatedNotDeployed))}
        ${card("Cluster connected", badge(d.cluster_connected ?? d.clusterConnected))}
        ${card("Helm", badge(area.helm))}
        ${card("Workload security", badge(area.workloadSecurity))}
        ${card("RBAC", badge(area.rbac))}
        ${card("NetworkPolicy", badge(area.networkPolicy))}
        ${card("Storage", badge(area.storage))}
        ${card("Batch jobs", badge(area.batchJobs))}
        ${card("GitOps", badge(area.gitops))}
        ${card("Auto-sync enabled", badge(prod.autoSyncEnabled))}
        ${card("Production app enabled", badge(prod.productionApplicationEnabled))}
        ${card("Markers", esc(ms.total))}
      </div>
      <h2 style="margin-top:20px">Production safety caveat</h2>
      <p class="note">Production is NOT ready. Real rollout still requires ArgoCD install, real destination clusters, repo credentials, production OIDC, a secret store, image-digest pinning, a backup target, operator approval, and a runtime cluster smoke.</p>
      <h2 style="margin-top:20px">Environments</h2>
      <table><tr><th>Environment</th><th>Active</th><th>Disabled</th><th>Production</th><th>Auto-sync</th><th>Values</th></tr>${envRows}</table>
      <h2 style="margin-top:20px">Safety facts</h2>${kvTable(facts)}
      <h2 style="margin-top:20px">Non-production limitations</h2>
      <ul>${limits.map(l => `<li>${esc(l)}</li>`).join("")}</ul>
      ${smokeBlock}`;
  }

  // Read-only identity posture. GET-only; NO OIDC login / connect / configure,
  // NO production auth toggle, NO role-mapping editor, NO break-glass button,
  // NO token/secret display, NO mutation control is rendered here.
  async function renderIdentity(el) {
    const d = await apiGet("/operations/identity/report");
    const oidc = d.oidc || {};
    const sess = d.session || {};
    const rm = d.roleMapping || {};
    const bg = d.breakGlass || {};
    const az = d.authorization || {};
    const limits = d.limitations || [];
    el.innerHTML = `<h2>Production Identity & OIDC Foundation</h2>
      <p class="note">Read-only identity posture — production identity is NOT enabled. No real IdP, no OIDC discovery/JWKS fetch, no callback, no token exchange, no production login. This view provides NO login / connect / configure / role-mapping / break-glass / mutation control.</p>
      <div class="grid">
        ${card("Posture status", badge(d.status))}
        ${card("Production identity ready", badge(d.productionIdentityReady))}
        ${card("Production auth enabled", badge((d.posture||{}).productionAuthEnabled))}
        ${card("Test-local (non-production)", badge((d.posture||{}).testLocalEnabled))}
        ${card("OIDC abstraction", badge(oidc.abstractionEnabled))}
        ${card("OIDC enabled", badge(oidc.enabled))}
        ${card("OIDC configured", badge(oidc.configured))}
        ${card("Discovery fetched", badge(oidc.discoveryFetched))}
        ${card("JWKS fetched", badge(oidc.jwksFetched))}
        ${card("Callback enabled", badge(oidc.callbackEnabled))}
        ${card("Token exchange", badge(oidc.tokenExchangeEnabled))}
        ${card("Session hardened", badge(sess.hardened))}
        ${card("Raw token persisted", badge(sess.rawTokenPersisted))}
        ${card("Session cleanup", badge(sess.cleanupAvailable))}
        ${card("Concurrency enforced", badge(sess.concurrencyEnforced))}
        ${card("Forced logout supported", badge(sess.forcedLogoutSupported))}
        ${card("Key rotation production-ready", badge(sess.keyRotationProductionReady))}
        ${card("Role mapping engine", badge(rm.enginePresent))}
        ${card("Role mapping configured", badge(rm.configured))}
        ${card("Unknown user", badge(rm.unknownUserBehavior))}
        ${card("Default role", badge(rm.defaultRole))}
        ${card("platform_admin auto-grant", badge(rm.platformAdminAutoGrant))}
        ${card("Break-glass enabled", badge(bg.enabled))}
        ${card("platform_admin infra authority", badge(az.platformAdminInfrastructureAuthority))}
        ${card("Human acceptance = deployment", badge(az.humanAcceptanceIsDeployment))}
      </div>
      <h2 style="margin-top:20px">Production identity caveat</h2>
      <p class="note">Production identity is NOT ready. Real enablement still requires a production secret store (Step 53), a configured production OIDC provider + real group→role mapping, a production session key rotation backend, and a production approval identity chain (Step 60). Break-glass is disabled. platform_admin has no infrastructure authority.</p>
      <h2 style="margin-top:20px">Production blockers / next required steps</h2>
      <ul>${limits.map(l => `<li>${esc(l)}</li>`).join("")}
          ${(d.nextRequiredSteps||[]).map(s => `<li>${esc(s)}</li>`).join("")}</ul>`;
  }

  // Read-only secret management foundation posture. GET-only; NO reveal / copy /
  // upload / rotate / configure / test secret control is rendered here. No secret
  // value is ever displayed.
  async function renderSecrets(el) {
    const d = await apiGet("/operations/secrets/report");
    const f = d.foundation || {};
    const limits = f.limitations || [];
    const next = f.nextRequiredSteps || [];
    el.innerHTML = `<h2>Production Secret Management Foundation</h2>
      <p class="note">Read-only secret foundation — production secret management is NOT configured. No real secret store, no secret values, no read/write/rotate. This view provides NO reveal / copy / upload / rotate / configure / test control and never displays a secret value.</p>
      <div class="grid">
        ${card("Foundation status", badge(d.status))}
        ${card("Production ready", badge(d.productionReady))}
        ${card("Production store configured", badge(f.productionStoreConfigured))}
        ${card("Production store enabled", badge(f.productionStoreEnabled))}
        ${card("Read value enabled", badge(f.readValueEnabled))}
        ${card("Write value enabled", badge(f.writeValueEnabled))}
        ${card("Rotation enabled", badge(f.rotationEnabled))}
        ${card("Inline values detected", badge(f.inlineValuesDetected))}
        ${card("Redaction policy", badge(f.redactionPolicyEnabled))}
        ${card("Categories covered", esc((f.categoriesCovered||[]).length))}
      </div>
      <h2 style="margin-top:20px">Production secret readiness caveat</h2>
      <p class="note">Production secret management is NOT ready. A production secret store (this Step), production OIDC client secret, production session key rotation backend, and production backup key store are all still required. No secret value is stored in the repo or displayed here.</p>
      <h2 style="margin-top:20px">Production blockers / next required steps</h2>
      <ul>${limits.map(l => `<li>${esc(l)}</li>`).join("")}
          ${next.map(s => `<li>${esc(s)}</li>`).join("")}</ul>`;
  }

  // Read-only application security & supply chain posture. GET-only; NO run-scan,
  // upload-source, connect-scanner, configure-scanner, create-PR, push-image, or
  // production-gate control is rendered here. No mutation action exists.
  async function renderSecurity(el) {
    const d = await apiGet("/operations/security/report");
    const f = d.foundation || {};
    const limits = f.limitations || [];
    const next = f.nextRequiredSteps || [];
    let scans = null;
    try { scans = await apiGet("/operations/security/scans/status"); } catch (_e) { scans = null; }
    let sbom = null, imgReady = null;
    try { sbom = await apiGet("/operations/security/sbom/status"); } catch (_e) { sbom = null; }
    try { imgReady = await apiGet("/operations/security/images/readiness"); } catch (_e) { imgReady = null; }
    const sbomLatest = (sbom && sbom.latest) || {};
    const imgBlockers = (imgReady && imgReady.blockers) || [];
    const containerBlock = sbom ? `
      <h2 style="margin-top:20px">SBOM / Image Digest / Container Security (Step 54.3)</h2>
      <p class="note">Read-only SBOM + container security baseline — local-only, modeled and locally verifiable, NOT production-enforced. No registry login, no image pull/push, no signing, no attestation, no SBOM upload, no production gate. This view provides NO generate-SBOM / scan-image / login-registry / push-image / sign / attest control. Runtime reports are never committed (status not_run here).</p>
      <div class="grid">
        ${card("SBOM baseline", badge(sbom.baselineEnabled))}
        ${card("SBOM local-only", badge(sbom.localOnly))}
        ${card("SBOM external upload", badge(sbom.externalUploadEnabled))}
        ${card("SBOM reports committed", badge(sbom.runtimeReportsCommitted))}
        ${card("SBOM last status", badge(sbomLatest.status || "not_run"))}
        ${card("Container production ready", badge(imgReady && imgReady.productionReady))}
        ${card("Production gate", badge(imgReady && imgReady.productionGateEnabled))}
      </div>
      <h2 style="margin-top:20px">Production readiness caveat / blockers</h2>
      <p class="note">Production SBOM, production image supply chain, and the production image vulnerability gate are NOT ready. Digest pinning, non-root images, an external CVE scan, signing/attestation, and a non-production cluster smoke (Step 55) are still required.</p>
      <ul>${imgBlockers.map(b => `<li>${esc(b)}</li>`).join("")}</ul>` : "";
    let step54 = null, risk = null, evidence = null, readiness = null;
    try { step54 = await apiGet("/operations/security/step54/status"); } catch (_e) { step54 = null; }
    try { risk = await apiGet("/operations/security/release-risk/summary"); } catch (_e) { risk = null; }
    try { evidence = await apiGet("/operations/security/evidence/package"); } catch (_e) { evidence = null; }
    try { readiness = await apiGet("/operations/security/readiness/report"); } catch (_e) { readiness = null; }
    const tmPresent = (step54 && step54.threatModelsPresent) || {};
    const intBlockers = (risk && risk.blockers) || (step54 && step54.blockers) || [];
    const intNext = (step54 && step54.requiredNextSteps) || [];
    const integratedBlock = step54 ? `
      <h2 style="margin-top:20px">Threat Model / Release Risk / Evidence (Step 54.4)</h2>
      <p class="note">Read-only Step 54 integrated security posture — threat model, release risk summary, security evidence package and readiness report are modeled and locally verifiable, NOT production-enforced. A release risk summary is NOT a production approval. No generate-evidence / approve-release / enable-gate / deploy / create-PR / sync-ArgoCD control. Runtime evidence / risk / readiness artifacts are never committed (status not_run here).</p>
      <div class="grid">
        ${card("Step54 integrated", badge(step54.step54Integrated))}
        ${card("Threat model baseline", badge(tmPresent.baseline))}
        ${card("Agent threats", badge(tmPresent.agent))}
        ${card("Supply chain threats", badge(tmPresent.supplyChain))}
        ${card("Runtime/GitOps threats", badge(tmPresent.runtimeGitops))}
        ${card("Release risk status", badge((risk && risk.status) || "not_run"))}
        ${card("Risk score", esc((risk && risk.riskScore) != null ? risk.riskScore : "not_run"))}
        ${card("Production approval", badge(risk && risk.productionApproval))}
        ${card("Deployment approval", badge(risk && risk.deploymentApproval))}
        ${card("Evidence status", badge((evidence && evidence.status) || "present_runtime_only"))}
        ${card("Readiness status", badge((readiness && (readiness.releaseRiskStatus || readiness.status)) || "not_run"))}
        ${card("Step54 production ready", badge(step54.productionReady))}
        ${card("Release gate", badge(step54.releaseGateEnabled))}
      </div>
      <h2 style="margin-top:20px">Production blockers / dependencies</h2>
      <p class="note">Step 55 (non-production cluster smoke), Step 56 (real ArgoCD manual sync) and Step 60 (production readiness review) are still required. Claude Code does not decide Production readiness.</p>
      <ul>${intBlockers.map(b => `<li>${esc(b)}</li>`).join("")}
          ${intNext.map(s => `<li>${esc(s)}</li>`).join("")}</ul>` : "";
    const bc = (scans && scans.baselineConfiguration) || {};
    const sev = (k) => ((scans && scans[k]) || {}).status || "not_run";
    const scanBlock = scans ? `
      <h2 style="margin-top:20px">Local Scan Toolchain Baseline (Step 54.2)</h2>
      <p class="note">Local-only scan baseline — no external scanner, no source upload, no token, no network, no run-scan control. Runtime scan reports are never committed; live status is not_run when no local scan has run in this environment. Scans are NOT production-enforced.</p>
      <div class="grid">
        ${card("Local scan baseline", badge(bc.localScanBaselineEnabled))}
        ${card("Secret scan configured", badge(bc.secretScanConfigured))}
        ${card("SAST configured", badge(bc.sastConfigured))}
        ${card("Dependency scan configured", badge(bc.dependencyScanConfigured))}
        ${card("External upload", badge(bc.externalUploadEnabled))}
        ${card("Network", badge(bc.networkEnabled))}
        ${card("Token required", badge(bc.tokenRequired))}
        ${card("Result normalization", badge(bc.resultNormalizationEnabled))}
        ${card("Reports committed", badge(bc.reportsCommitted))}
        ${card("Production gate", badge(bc.productionGateEnabled))}
        ${card("Production ready", badge(scans.productionReady))}
        ${card("Secret scan last", badge(sev("secret")))}
        ${card("SAST last", badge(sev("sast")))}
        ${card("Dependency scan last", badge(sev("dependency")))}
      </div>` : "";
    el.innerHTML = `<h2>Application Security & Supply Chain Baseline</h2>
      <p class="note">Read-only security posture — application security and supply chain baseline is modeled, NOT enforced for production. No scanner run, no SBOM generated, no image pushed, no GitHub write, no production gate. This view provides NO run-scan / upload-source / connect-scanner / configure-scanner / create-PR / push-image / production-gate control.</p>
      <div class="grid">
        ${card("Foundation status", badge(d.status))}
        ${card("Production ready", badge(d.productionReady))}
        ${card("SAST configured", badge(f.sastConfigured))}
        ${card("Dependency scan configured", badge(f.dependencyScanConfigured))}
        ${card("Secret scan configured", badge(f.secretScanConfigured))}
        ${card("SBOM configured", badge(f.sbomConfigured))}
        ${card("Image digest policy", badge(f.imageDigestPolicyDefined))}
        ${card("Image vulnerability policy", badge(f.imageVulnerabilityPolicyDefined))}
        ${card("Threat model required", badge(f.threatModelRequired))}
        ${card("Release risk required", badge(f.releaseRiskSummaryRequired))}
        ${card("Evidence model", badge(f.evidenceModelDefined))}
        ${card("Finding taxonomy", badge(f.findingTaxonomyDefined))}
        ${card("Fail-closed gate policy", badge(f.gateFailClosedPolicyDefined))}
        ${card("GitHub write", badge(f.githubWriteEnabled))}
        ${card("PR creation", badge(f.prCreationEnabled))}
        ${card("Image push", badge(f.imagePushEnabled))}
        ${card("Registry login", badge(f.registryLoginEnabled))}
        ${card("External scanner upload", badge(f.externalScannerUploadEnabled))}
        ${card("Assets inventoried", esc(f.assetCount))}
        ${card("Production-relevant assets", esc(f.productionRelevantAssetCount))}
      </div>
      <h2 style="margin-top:20px">Production readiness caveat</h2>
      <p class="note">Security scans are NOT production-ready. SBOM is NOT generated. Image supply chain is NOT production-ready. The release gate is NOT production-ready. Step 54.2 (scan toolchain), Step 54.3 (SBOM / image digest / container security), and Step 54.4 (threat model / release risk / integrated verification) are still required.</p>
      <h2 style="margin-top:20px">Limitations / next required steps</h2>
      <ul>${limits.map(l => `<li>${esc(l)}</li>`).join("")}
          ${next.map(s => `<li>${esc(s)}</li>`).join("")}</ul>
      ${scanBlock}
      ${containerBlock}
      ${integratedBlock}`;
  }

  async function refreshSafetyPill() {
    try {
      const d = await apiGet("/operations/admin-console/safety-summary");
      document.getElementById("safety-pill").innerHTML = "Safety: " + badge(d.result);
    } catch (_e) { /* ignore */ }
  }

  function buildNav(active) {
    document.getElementById("nav").innerHTML = PAGES.map(p =>
      `<button data-page="${p.id}" class="${p.id===active?"active":""}">${esc(p.label)}</button>`).join("");
    document.querySelectorAll("nav button").forEach(b =>
      b.addEventListener("click", () => show(b.getAttribute("data-page"))));
  }
  async function show(id) {
    const page = PAGES.find(p => p.id === id) || PAGES[0];
    buildNav(page.id);
    const el = document.getElementById("main");
    el.innerHTML = `<div class="empty">Loading…</div>`;
    try { await page.render(el); } catch (e) { el.innerHTML = `<h2>${esc(page.label)}</h2>` + errorState(e); }
  }
  refreshSafetyPill();
  show("overview");
  </script>
</body>
</html>
