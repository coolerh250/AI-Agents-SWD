# Step 59 (Stage 61A) -- Sandbox draft PR metadata model.
#
# The draft PR title / body are generated from a fixed template. The body always
# states the non-production, no-merge, no-production-approval caveats. It never
# contains a secret, token, credential, raw prompt, chain-of-thought, production
# approval claim, or customer data.
sandboxDraftPrMetadata:
  titlePattern: "[Sandbox][Draft] {project_key}: {work_item_title}"
  draft: true
  readyForReview: false

  bodyRequiredSections:
    - Project
    - Work item
    - Dispatch
    - Correlation ID
    - Summary
    - Safety scope
    - Non-production caveat
    - No production approval
    - No merge authorization
    - Generated by AI Agents sandbox flow

  bodyForbiddenContent:
    - secret
    - token
    - credential
    - raw prompt
    - chain-of-thought
    - production approval claim
    - customer data

  caveats:
    nonProduction: "This is a non-production sandbox draft PR. It is not production approved."
    noMerge: "No merge authorization. This PR must not be merged by the platform."
    noProductionApproval: "No production approval is implied or granted by this PR."
    generatedBy: "Generated by AI Agents sandbox flow (Step 59, sandbox-only)."

  rules:
    - titleMustUsePattern
    - bodyMustContainAllRequiredSections
    - bodyMustNotContainForbiddenContent
    - draftTrue
    - readyForReviewFalse
