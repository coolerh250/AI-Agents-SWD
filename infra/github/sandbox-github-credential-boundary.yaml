# Step 59 (Stage 61A) -- Sandbox GitHub credential boundary.
#
# The sandbox draft-PR flow may only obtain a token from an environment variable or
# secret reference. A token is never committed, never logged, never returned by an API
# or shown in the Admin Console. When the token is absent, live_sandbox is blocked.
sandboxGitHubCredential:
  source:
    type: env                          # env var or secret reference only
    env: SANDBOX_GITHUB_TOKEN
    secretReferenceAllowed: true
  neverCommitted: true
  neverLogged: true
  neverReturned: true
  blockedWhenMissing: true             # live_sandbox blocked if token absent

  # The minimum scopes the sandbox token is expected to carry. Production deployment,
  # admin and workflow permissions are explicitly NOT requested.
  expectedMinimumScopes:
    - repo:contents:write              # create branch (sandbox repo only)
    - pull_requests:write              # open draft PR (sandbox repo only)
  forbiddenScopes:
    - admin
    - workflow
    - deployment
    - production

  rules:
    - tokenFromEnvOrSecretReferenceOnly
    - tokenNeverCommitted
    - tokenNeverLogged
    - tokenNeverReturned
    - liveSandboxBlockedWhenTokenMissing
    - noProductionDeploymentPermission
    - noAdminPermission
    - noWorkflowPermission
