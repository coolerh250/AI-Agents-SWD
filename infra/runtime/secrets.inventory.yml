# Stage 26 — secrets inventory.
#
# Single source of truth for the platform's secret-shaped configuration.
# This file lists NAMES, REQUIREMENTS, and LEAK POSTURE only. It MUST
# NEVER contain a real token or password. Bootstrap fixtures live in
# infra/runtime/mock-vault-secrets.example.json (placeholder values) and
# infra/runtime/.mock-vault-secrets.local.json (generated, gitignored).
#
# `provider` is the SecretProvider name that owns the secret in each
# environment:
#   - env         : EnvSecretProvider (reads os.environ)
#   - vault       : VaultKvSecretProvider (reads Vault KV v2)
#   - mock-vault  : MockVaultSecretProvider (reads a local JSON file)
#
# `rotation_policy` describes the expected refresh cadence; the
# platform does not enforce it today — it's documented intent.

version: 1
secrets:
  - name: POSTGRES_PASSWORD
    required_for:
      - postgres
      - orchestrator
      - communication-gateway
      - audit-service
      - audit-worker
      - notification-worker
      - discord-gateway
      - intake-agent
      - requirement-agent
      - development-agent
      - qa-agent
      - devops-agent
      - retry-scheduler
      - approval-engine
    environments: [staging, production]
    provider:
      local: env
      staging: mock-vault
      production: vault
    rotation_policy: 90d
    allowed_to_be_missing_in_local: true
    allowed_to_be_missing_in_staging: false
    leak_risk: high
    notes: >-
      Local/test compose uses POSTGRES_HOST_AUTH_METHOD=trust so the
      password is unused. Staging Postgres REQUIRES a real password
      (`${POSTGRES_PASSWORD:?}` in docker-compose.staging.yml).

  - name: GITHUB_TOKEN
    required_for:
      - github-automation
      - orchestrator
    environments: [staging-opt-in, production-opt-in]
    provider:
      local: env
      staging: mock-vault
      production: vault
    rotation_policy: 60d
    allowed_to_be_missing_in_local: true
    allowed_to_be_missing_in_staging: true
    leak_risk: critical
    notes: >-
      Only used when RUN_REAL_GITHUB_TEST=true AND GITHUB_TEST_REPO is
      set. The Stage 23 safety guard refuses every call without all
      three preconditions. NEVER print this value.

  - name: DISCORD_BOT_TOKEN
    required_for:
      - discord-gateway
      - notification-worker
    environments: [staging-opt-in, production-opt-in]
    provider:
      local: env
      staging: mock-vault
      production: vault
    rotation_policy: 60d
    allowed_to_be_missing_in_local: true
    allowed_to_be_missing_in_staging: true
    leak_risk: critical
    notes: >-
      Only used when RUN_REAL_DISCORD_TEST=true AND
      DISCORD_TEST_CHANNEL_ID is set. NEVER print this value.

  - name: DISCORD_TEST_CHANNEL_ID
    required_for:
      - discord-gateway
      - notification-worker
    environments: [staging-opt-in, production-opt-in]
    provider:
      local: env
      staging: env
      production: env
    rotation_policy: as-needed
    allowed_to_be_missing_in_local: true
    allowed_to_be_missing_in_staging: true
    leak_risk: low
    notes: >-
      Not a secret in the cryptographic sense, but pairs with
      DISCORD_BOT_TOKEN. Surfaced here so the inventory stays
      complete.

  - name: ALERTMANAGER_WEBHOOK_URL
    required_for:
      - alertmanager
    environments: [staging-opt-in, production]
    provider:
      local: env
      staging: env
      production: vault
    rotation_policy: as-needed
    allowed_to_be_missing_in_local: true
    allowed_to_be_missing_in_staging: true
    leak_risk: medium
    notes: >-
      Local/test uses the null receiver. Staging may keep the null
      receiver. Production-check FAILS when this URL is empty or a
      placeholder.

  - name: VAULT_TOKEN
    required_for:
      - VaultKvSecretProvider
    environments: [staging-with-vault, production]
    provider:
      local: env
      staging: env
      production: env
    rotation_policy: 30d
    allowed_to_be_missing_in_local: true
    allowed_to_be_missing_in_staging: true
    leak_risk: critical
    notes: >-
      Only required when SECRET_PROVIDER=vault. Read from the host env
      and passed via SecretRef — never echoed.

  - name: VAULT_ADDR
    required_for:
      - VaultKvSecretProvider
    environments: [staging-with-vault, production]
    provider:
      local: env
      staging: env
      production: env
    rotation_policy: as-needed
    allowed_to_be_missing_in_local: true
    allowed_to_be_missing_in_staging: true
    leak_risk: low
    notes: >-
      The Vault server URL. NOT a secret on its own, but listed for
      completeness so the inventory check can flag a misconfigured
      vault provider.
