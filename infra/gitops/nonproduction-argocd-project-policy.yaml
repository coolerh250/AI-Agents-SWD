# Step 56 (Stage 58A) -- NON-PRODUCTION ArgoCD project policy (descriptor).
#
# Declares the restriction policy the restricted AppProject must satisfy. The actual
# AppProject manifest is infra/gitops/nonproduction/aiagents-nonprod-project.yaml; the
# project-policy verifier asserts the manifest matches this descriptor.
nonProductionArgocdProjectPolicy:
  project:
    name: aiagents-nonprod
    productionAllowed: false
    destinations:
      - namespace: aiagents-smoke-dev
        server: https://kubernetes.default.svc
    sourceRepos:
      - https://github.com/coolerh250/AI-Agents-SWD.git
    forbiddenNamespaces:
      - default
      - kube-system
      - argocd
      - production
      - prod
    syncPolicy:
      automated: false
      prune: false
      selfHeal: false
    clusterResourceWhitelist: []
    namespaceResourceWhitelist:
      allowed:
        - Deployment
        - StatefulSet
        - Service
        - ConfigMap
        - Secret
        - ServiceAccount
        - PersistentVolumeClaim
        - Job
        - CronJob
        - NetworkPolicy
    wildcardDestinationAllowed: false
    clusterWideResourcesAllowed: false
    productionRepoCredentialAllowed: false
