# Step 56 (Stage 58A) -- restricted NON-PRODUCTION ArgoCD AppProject.
#
# Confines the non-production Application to the aiagents-smoke-dev namespace on the
# local kind cluster only. NO production namespace, NO wildcard destination, NO
# cluster-scoped resources, NO auto-sync (sync policy lives on the Application and
# is manual-only). Source is restricted to this single public repo (read-only).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: aiagents-nonprod
  namespace: argocd-nonprod
spec:
  description: Non-production restricted project (manual sync only; no production scope)
  # Single, explicit repo (no wildcard). Public repo -> read-only, no credential.
  sourceRepos:
    - https://github.com/coolerh250/AI-Agents-SWD.git
  # Single explicit non-production destination (no wildcard namespace/server).
  destinations:
    - namespace: aiagents-smoke-dev
      server: https://kubernetes.default.svc
  # No cluster-scoped resources may be managed by this project.
  clusterResourceWhitelist: []
  # Only the namespaced kinds the non-production chart renders.
  namespaceResourceWhitelist:
    - {group: "apps", kind: Deployment}
    - {group: "apps", kind: StatefulSet}
    - {group: "", kind: Service}
    - {group: "", kind: ConfigMap}
    - {group: "", kind: Secret}
    - {group: "", kind: ServiceAccount}
    - {group: "", kind: PersistentVolumeClaim}
    - {group: "batch", kind: Job}
    - {group: "batch", kind: CronJob}
    - {group: "networking.k8s.io", kind: NetworkPolicy}
