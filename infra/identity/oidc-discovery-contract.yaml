# Step 52.2 -- OIDC Discovery Metadata Model (Stage 54B).
# SCHEMA ONLY. Defines the metadata fields a future production discovery
# document MUST provide. NO discovery document is fetched in this step.
# No external HTTP request is performed; no real endpoint is stored.

version: "1"

discovery:
  fetchEnabled: false
  lastFetchedAt: null
  metadataConfigured: false
  validated: false

expectedMetadataFields:
  - issuer
  - authorization_endpoint
  - token_endpoint
  - jwks_uri
  - userinfo_endpoint
  - end_session_endpoint
  - response_types_supported
  - subject_types_supported
  - id_token_signing_alg_values_supported
  - scopes_supported
  - claims_supported

constraints:
  externalRequestAllowed: false
  realEndpointStored: false
  requiredResponseType: code
  requiredSubjectType: public
  requiredSigningAlg: RS256

status: disabled_unconfigured
