# Step 52.3 -- Break-glass Identity Model (Stage 54C).
# DEFINED, DISABLED. No break-glass login route, no admin button, no automatic
# platform_admin access. Requires a future production approval model (Step 60).

version: "1"

breakGlass:
  enabled: false
  loginRouteExists: false
  adminButtonExists: false
  platformAdminAutomaticAccess: false

  requirements:
    productionIdentityRequired: true
    separateApprovalRequired: true
    timeBoundSessionRequired: true
    reasonRequired: true
    auditRequired: true
    postIncidentReviewRequired: true

  prohibitions:
    canBeTestLocal: false
    canBypassAudit: false
    autoGrantsKubernetes: false
    autoGrantsArgoCD: false
    autoGrantsGitHub: false
    autoGrantsProductionDeploy: false

dependencies:
  productionApprovalModel: "60"

status:
  productionReady: false
  reason: disabled_pending_production_approval_model
