# Step 61 (Stage 63A) -- Backup target inventory.
#
# Declarative inventory of what the platform can back up as governance evidence. Every
# target is annotated with classification + handling flags. restore_allowed_production is
# false for EVERY target (production restore is blocked). Targets that contain secrets are
# redacted / excluded / secret-managed and never backed up as plaintext. This inventory
# itself contains NO secret, token, kubeconfig, raw dump, or customer data.
backupTargets:
  - name: postgresql
    source: postgres
    classification: database_dump
    contains_secret: false
    contains_customer_data: false
    contains_runtime_state: true
    contains_audit_evidence: true
    backup_allowed: true
    restore_allowed_nonprod: true
    restore_allowed_production: false
    retention_class: database_dump
    cleanup_allowed: false

