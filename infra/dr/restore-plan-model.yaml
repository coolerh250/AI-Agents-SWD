# Step 61 (Stage 63A) -- Restore plan model.
#
# A restore plan describes an intended NON-PRODUCTION restore validation. It never
# executes a restore against an active runtime. A production target environment is
# blocked; production_restore is always false. Forbidden restore types (production /
# overwrite / failover / customer data) are rejected.
restorePlan:
  fields:
    - restore_plan_id
    - target
    - source_artifact
    - target_environment
    - restore_type
    - status
    - requires_human_approval
    - production_restore
    - validation_required
    - rollback_plan_required
    - created_at

  restoreTypes:
    - validate_backup
    - restore_nonproduction_copy
    - dry_run_restore
    - schema_validation
    - integrity_validation

  forbiddenRestoreTypes:
    - restore_production
    - overwrite_production
    - failover_production
    - restore_customer_data

  statuses:
    - planned
    - validated
    - blocked
    - operator_review_requested

  allowedEnvironments:
    - local
    - dev
    - test
    - nonprod
  forbiddenEnvironments:
    - production
    - prod

  productionRestore: false
  validationRequired: true
  rollbackPlanRequired: true
  executesRestore: false
