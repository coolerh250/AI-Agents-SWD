# Step 54.1 -- secret scan policy model (Stage 56A).
# Models the secret scanning requirement. Ties into the Step 53 redaction /
# no-inline-secret posture. The custom repo scanner exists but a full secret
# scanner toolchain is NOT configured. No external upload.
version: "1"
meta:
  stage: 56A
  step: "54.1"
secretScan:
  required: true
  configured: false
  allowedTools:
    - gitleaks
    - detect-secrets
    - custom_repo_secret_scan
  scanScope:
    - repository
    - infra
    - docs
    - tests
  failPolicy:
    anyConfirmedSecret: fail
    suspiciousHighEntropy: review_required
  existingControls:
    step53NoInlineSecretVerifier: scripts/verify_secret_no_inline_values.py
    step53RedactionPolicy: infra/secrets/secret-redaction-policy.yaml
    customRepoScanner: tests/test_secret_leak_scanner.py
    note: "These enforce no committed inline secret today; a CI secret scanner is still required."
  productionReady: false
  futureEnforcementStep: "54.2"
