# Step 54.4 (Stage 56D) -- release risk scoring policy.
# Modeled, NOT enforced. Score is NOT approval; a low score is NOT production
# ready; missing required evidence is always not_ready. Production gate disabled.
version: "1"
meta:
  stage: "56D"
  step: "54.4"

riskScoring:
  status: modeled_not_enforced
  productionReady: false
  productionGateEnabled: false
  scoreRange:
    min: 0
    max: 100
  blockers:
    confirmedSecretLeak: critical_blocker
    criticalFinding: critical_blocker
    missingSBOM: not_ready
    missingImageDigest: not_ready
    missingThreatModel: not_ready
    productionIdentityNotReady: not_ready
    productionSecretStoreNotReady: not_ready
    runtimeNotValidated: not_ready
  severityWeights:
    critical: 100
    high: 40
    medium: 15
    low: 5
  interpretation:
    scoreIsNotApproval: true
    lowScoreIsNotProductionReady: true
    missingRequiredEvidenceForcesNotReady: true
    productionGateRemainsDisabled: true
