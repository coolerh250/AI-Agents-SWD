# Step 54.3 -- registry credential boundary (Stage 56C).
# Registry credentials are referenced via the Step 53 secret store only -- never
# committed. No registry login, no image push/pull-with-credential this stage.
version: "1"
meta:
  stage: 56C
  step: "54.3"
  ties: infra/secrets (Step 53 secret references; store=disabled)

registryCredentialBoundary:
  credentialViaSecretStoreOnly: true
  credentialInRepo: false
  registryLoginInThisStage: false
  imagePushInThisStage: false
  imagePullWithCredentialInThisStage: false
  kubernetesImagePullSecret: future_reference_only
  argocdImageAccess: future_reference_only
  productionRegistryAccess: disabled
  secretReferenceCatalog: infra/secrets/gitops-secret-references.yaml
  productionReady: false
  notes:
    - "A future image pull secret would be a Step 53 SecretRef (store=disabled today)."
    - "No registry credential, token, or kubeconfig is committed."
