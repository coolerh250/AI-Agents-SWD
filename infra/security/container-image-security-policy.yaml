      detail: "All 20 first-party Dockerfiles run as root (no USER directive)."
      severity: high
    - key: helm_images_not_digest_pinned
      detail: "Helm values carry empty digest fields for all images."
      severity: high
    - key: first_party_images_placeholder_tag
      detail: "First-party Helm images use tag step-51-1-placeholder."
      severity: medium
    - key: third_party_images_tag_only
      detail: "postgres:16 / redis:7 / vault:1.17 pinned by tag, not digest."
      severity: medium
  step51Observations:
    - first_party_images_require_nonroot_cluster_smoke
    - job_image_pg_dump_psql_runtime_smoke_required
  productionReady: false
  futureEnforcementStep: "54.3"
