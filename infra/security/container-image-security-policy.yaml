# Step 54.1 -- container image security policy model (Stage 56A).
# Models container image security requirements + records the CURRENT gaps. No
# Dockerfile is modified, no image is built/pushed/scanned this stage.
version: "1"
meta:
  stage: 56A
  step: "54.1"
containerImageSecurity:
  required: true
  configured: false
  requirements:
    digestPinningRequired: true
    latestTagProhibitedBeforeRuntimeSmoke: true
    nonRootUserRequired: true
    readOnlyRootFilesystemAlignment: true
    minimalBaseImageDesired: true
    imageVulnerabilityScanRequired: true
    sbomRequired: true
    signatureAttestationFuture: true
    registryCredentialViaStep53SecretRefs: true
    imagePushInThisStage: false
  currentGaps:
