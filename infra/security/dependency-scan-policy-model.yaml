# Step 54.1 -- dependency scan policy model (Stage 56A).
# Models the dependency vulnerability scan requirement. No audit run, no external
# connection. Records the current lockfile posture as a blocker.
version: "1"
meta:
  stage: 56A
  step: "54.1"
dependencyScan:
  required: true
  configured: false
  supportedEcosystems:
    - python
    - node
    - container_base_images
  allowedTools:
    - pip-audit
    - npm-audit
    - osv-scanner
  lockfileRequired: true
  lockfileStatus:
    python:
      present: false
      blocker: python_dependencies_unpinned_no_lockfile
    node:
      present: true
      lockFile: apps/admin-console/package-lock.json
  failPolicy:
    critical: fail
    high: fail_or_approval_required
    medium: approval_required
  productionReady: false
  blockers:
    - python_lockfile_missing
  futureEnforcementStep: "54.2"
