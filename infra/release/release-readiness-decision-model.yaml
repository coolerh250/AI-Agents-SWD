# Step 60 (Stage 62A) -- Release readiness decision model.
#
# Readiness is a GOVERNANCE judgement, not a production approval. production_ready is
# always false in Step 60. A human-review request is not a human approval.
releaseReadinessDecision:
  productionReady: false

  decisions:
    - not_ready
    - ready_for_operator_review
    - blocked_by_missing_evidence
    - blocked_by_security
    - blocked_by_policy
    - accepted_nonproduction

  mustBlockWhen:
    - production_target_requested
    - missing_security_evidence
    - missing_rollback_plan
    - missing_audit_linkage
    - production_approval_missing
    - sandbox_pr_not_reviewed_or_merged
    - runtime_unavailable_for_target
    - gitops_unhealthy
    - policy_violation

  invariants:
    - productionReadyAlwaysFalse
    - readinessIsGovernanceNotProductionApproval
    - humanReviewRequestIsNotHumanApproval
