# Step 53 -- Secret Inventory (Stage 55A).
# REFERENCES ONLY. No real secret value, no token, no key, no password.
# Every production secret is unconfigured, fail-closed, and requires a future
# production secret store (Step 53 connects no real store).

version: "1"

secrets:
  - key: oidc_client_secret
    name: OIDC client secret
    category: identity
    requiredFor: production_oidc_login
    environments: {dev: not_applicable, test: not_applicable, staging: required, production: required}
    currentStatus: unconfigured
    productionRequired: true
    productionConfigured: false
    valueStoredInRepo: false
    valueStoredInRuntime: false
    secretStoreRequired: true
    owner: identity_owner
    rotationRequired: true
    auditSensitivity: critical
    references: [identity-secret-references.yaml#oidc_client_secret]
    blockers: [no_production_secret_store, no_real_oidc_provider]

  - key: session_signing_key
