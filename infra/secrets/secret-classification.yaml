# Step 53 -- Secret Classification (Stage 55A).
# Distinguishes secrets (store-only) from public config. No real values.

version: "1"

classes:
  critical:
    handling: secret_store_only
    examples: [oidc_client_secret, session_signing_key, backup_encryption_key, audit_hmac_keyring, kubernetes_cluster_credential, break_glass_credential]
  high:
    handling: secret_store_only
    examples: [database_credential, redis_credential, github_credential, argocd_repo_credential, registry_credential, csrf_signing_key, cookie_signing_key, backup_target_credential, llm_api_key]
  medium:
    handling: secret_store_only
    examples: [notification_webhook, storage_drive_credential]
  public-config:
    handling: config_allowed_not_secret
    examples: [oidc_issuer_url, oidc_jwks_uri, oidc_redirect_uri, oidc_client_id]
  placeholder:
    handling: allowed_if_clearly_disabled
    examples: [disabled_store_reference]

rules:
  publicConfigIsNotSecret: true
  oidcIssuerUrlIsPublicConfig: true
  oidcIssuerUrlRealValueAllowedThisStage: false
  oidcClientIdIsNonSecretReference: true
  oidcClientIdRealValueAllowedThisStage: false
  oidcClientSecretMustBeSecretRef: true
  sessionSigningKeyMustBeSecretRef: true
  backupEncryptionKeyMustBeSecretRef: true
  auditHmacKeyMustBeSecretRef: true
