# Step 53 -- Secret Rotation Model (Stage 55A).
# MODEL ONLY. No real rotation performed; production store required first.

version: "1"

rotation:
  required: true
  productionStoreRequired: true
  rotationWithoutDowntime:
    required: true
    supportedBy:
      - session_keyring_future
      - audit_hmac_keyring_existing_or_future
      - oidc_client_secret_dual_slot_future
  emergencyRotation:
    required: true
    approvalRequired: true
  status: model_only

secretRotationPlans:
  - secretKey: session_signing_key
    strategy: dual_slot_keyring_future
    productionStoreRequired: true
  - secretKey: audit_hmac_keyring
    strategy: keyring_overlap_window
    productionStoreRequired: true
  - secretKey: oidc_client_secret
    strategy: dual_slot_overlap_future
    productionStoreRequired: true
  - secretKey: database_credential
    strategy: rolling_credential_future
    productionStoreRequired: true
  - secretKey: redis_credential
    strategy: rolling_credential_future
    productionStoreRequired: true
  - secretKey: backup_encryption_key
    strategy: key_version_overlap_future
    productionStoreRequired: true
  - secretKey: github_credential
    strategy: app_credential_rotation_future
    productionStoreRequired: true
  - secretKey: argocd_repo_credential
    strategy: credential_rotation_future
    productionStoreRequired: true
  - secretKey: registry_credential
    strategy: credential_rotation_future
    productionStoreRequired: true
  - secretKey: llm_api_key
    strategy: key_rotation_future
    productionStoreRequired: true
  - secretKey: notification_webhook
    strategy: url_rotation_future
    productionStoreRequired: true
