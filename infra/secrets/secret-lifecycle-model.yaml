# Step 53 -- Secret Lifecycle Model (Stage 55A).
# MODEL ONLY. Secret values never traverse the repo, audit, Admin Console, logs,
# or test fixtures.

version: "1"

lifecycle:
  stages:
    - request
    - approval
    - provisioning
    - reference_registration
    - rotation
    - emergency_rotation
    - revocation
    - audit
    - post_rotation_verification
    - decommission
  productionApprovalRequired: true

valueHandling:
  valueViaRepo: false
  valueInAudit: false
  valueInAdminConsole: false
  valueInLogs: false
  valueInTestFixtures: false
  rotationRecordStoresMetadataOnly: true

status: model_only
