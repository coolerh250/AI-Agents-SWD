# Step 53 -- Secret Audit Model (Stage 55A).
# Future audit events for secret reference governance. Never records a value.

version: "1"

events:
  - key: secret_ref_registered
  - key: secret_ref_updated
  - key: secret_rotation_requested
  - key: secret_rotation_completed
  - key: secret_access_denied
  - key: secret_store_unavailable
  - key: secret_validation_failed

recordedFields:
  actorRole: true
  reason: true
  approvalReference: true
  correlationId: true

neverRecorded:
  - secret_value
  - raw_token
  - sensitive_secret_path
  - private_key
  - client_secret
  - password
  - jwt

productionMutation: deferred
status: model_only
