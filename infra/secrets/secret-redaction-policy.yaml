# Step 53 -- Secret Redaction Policy (Stage 55A).
# Applied to operations API, Admin Console, audit metadata, verification output,
# and runtime reports.

version: "1"

redactKeySubstrings:
  - secret
  - token
  - password
  - key
  - private
  - credential
  - bearer
  - cookie
  - csrf
  - jwt

redactValuePatterns:
  - jwt_like_string
  - private_key_block
  - high_entropy_string
  - oauth_code
  - database_url_with_password
  - webhook_url
  - kubeconfig
  - service_account_token
  - registry_auth

appliesTo:
  - operations_api
  - admin_console
  - audit_metadata
  - verification_output
  - runtime_reports

redactionToken: "***REDACTED***"
status: enabled
