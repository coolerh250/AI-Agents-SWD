# Step 62 (Stage 64A) -- Readiness evidence inventory.
#
# Inventory of the evidence the readiness gate consumes. Every item is annotated with
# source / freshness / availability / redaction / production scope. ALL production_scope is
# false (or blocked) at this stage; runtime / GitOps evidence is non-production only. The
# inventory contains NO secret. Missing evidence is never reported as clean.
readinessEvidence:
  items:
    - name: step52_identity_baseline
      source: IDENTITY_FOUNDATION_BASELINE_VERIFY
      freshness: live
      availability: available
      redaction: redacted
      production_scope: false
      nonproduction_only: true
      blocking_limitations: nonproduction_identity_only
    - name: step53_secret_management_baseline
      source: SECRET_MANAGEMENT_FOUNDATION_BASELINE_VERIFY
