# Step 63A (Stage 65A) -- Production credential readiness model.
#
# Records only whether a production secret REFERENCE is configured -- never the credential
# value, never a sensitive secret name. No production credential is created or read; no
# secret is committed. Every reference is currently not_configured.
productionCredentialReadiness:
  references:
    - name: production_database_credential_ref
      configured: false
    - name: production_registry_credential_ref
      configured: false
    - name: production_argocd_token_ref
      configured: false
    - name: production_kubeconfig_ref
      configured: false
    - name: production_observability_credential_ref
      configured: false

  status: missing
  reads_credential_values: false
  creates_credentials: false
  exposes_secret: false
