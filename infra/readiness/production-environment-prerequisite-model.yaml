    - name: production_argocd_application_defined
      status: missing
    - name: production_backup_configured
      status: not_configured
    - name: production_restore_tested
      status: not_tested
    - name: production_monitoring_configured
      status: not_configured
    - name: production_alerting_configured
      status: not_configured
    - name: production_rollback_path_defined
      status: not_configured
    - name: production_approval_channel_configured
      status: not_configured
    - name: production_incident_response_owner_assigned
      status: not_assigned
