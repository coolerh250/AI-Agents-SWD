name: aiagents-test

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: aiagents
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aiagents"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.17
    command: server -dev
    environment:
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "127.0.0.1:8200:8200"

  policy-engine:
    build:
      context: ../..
      dockerfile: apps/policy-engine/Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: policy-engine
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  approval-engine:
    build:
      context: ../..
      dockerfile: apps/approval-engine/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: approval-engine
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  audit-service:
    build:
      context: ../..
      dockerfile: apps/audit-service/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: audit-service
    ports:
      - "127.0.0.1:8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  notification-worker:
    build:
      context: ../..
      dockerfile: apps/notification-worker/Dockerfile
    environment:
      NOTIFICATION_WORKER_MODE: sandbox
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_TEST_GUILD_ID: ${DISCORD_TEST_GUILD_ID:-}
      DISCORD_TEST_CHANNEL_ID: ${DISCORD_TEST_CHANNEL_ID:-}
      DISCORD_ALLOWED_ROLE_ID: ${DISCORD_ALLOWED_ROLE_ID:-}
      RUN_REAL_DISCORD_TEST: ${RUN_REAL_DISCORD_TEST:-false}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      ORCHESTRATOR_PUBLIC_URL: http://localhost:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: notification-worker
    ports:
      - "127.0.0.1:8008:8008"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  discord-gateway:
    build:
      context: ../..
      dockerfile: apps/discord-gateway/Dockerfile
    environment:
      DISCORD_GATEWAY_MODE: sandbox
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_TEST_GUILD_ID: ${DISCORD_TEST_GUILD_ID:-}
      DISCORD_TEST_CHANNEL_ID: ${DISCORD_TEST_CHANNEL_ID:-}
      DISCORD_ALLOWED_ROLE_ID: ${DISCORD_ALLOWED_ROLE_ID:-}
      RUN_REAL_DISCORD_TEST: ${RUN_REAL_DISCORD_TEST:-false}
      COMMUNICATION_GATEWAY_URL: http://communication-gateway:8004
      ORCHESTRATOR_URL: http://orchestrator:8000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      GITHUB_DEFAULT_REPO: coolerh250/AI-Agents-SWD
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: discord-gateway
    ports:
      - "127.0.0.1:8007:8007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  audit-worker:
    build:
      context: ../..
      dockerfile: apps/audit-worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: audit-worker
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY:-}
      AUDIT_HMAC_KEY_ID: ${AUDIT_HMAC_KEY_ID:-}
    ports:
      - "127.0.0.1:8006:8006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  orchestrator:
    build:
      context: ../..
      dockerfile: apps/orchestrator/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      POLICY_ENGINE_URL: http://policy-engine:8001
      APPROVAL_ENGINE_URL: http://approval-engine:8002
      AUDIT_SERVICE_URL: http://audit-service:8003
      # Stage 23 controlled-real GitHub validation surface — the
      # orchestrator's /operations/safety only inspects the presence
      # of these env vars; the token value is never read here.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      RUN_REAL_GITHUB_TEST: ${RUN_REAL_GITHUB_TEST:-false}
      GITHUB_TEST_REPO: ${GITHUB_TEST_REPO:-}
      # Stage 32 real Discord pilot env -- the orchestrator's
      # /operations/safety + /operations/real-integrations only
      # inspect presence; the bot token value is never read here.
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_TEST_GUILD_ID: ${DISCORD_TEST_GUILD_ID:-}
      DISCORD_TEST_CHANNEL_ID: ${DISCORD_TEST_CHANNEL_ID:-}
      DISCORD_ALLOWED_ROLE_ID: ${DISCORD_ALLOWED_ROLE_ID:-}
      RUN_REAL_DISCORD_TEST: ${RUN_REAL_DISCORD_TEST:-false}
      # Stage 34 -- audit integrity HMAC env. Presence only is consulted by
      # /operations/audit/integrity; the key value is never read into a
      # response or log.
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY:-}
      AUDIT_HMAC_KEY_ID: ${AUDIT_HMAC_KEY_ID:-}
      # Stage 45 -- project planner / task graph feature flags. Planning-only;
      # work-item dispatch + real LLM stay OFF.
      ENABLE_PROJECT_PLANNER: ${ENABLE_PROJECT_PLANNER:-true}
      PROJECT_PLANNER_PLANNING_ONLY: ${PROJECT_PLANNER_PLANNING_ONLY:-true}
      ENABLE_PROJECT_WORK_ITEM_DISPATCH: ${ENABLE_PROJECT_WORK_ITEM_DISPATCH:-false}
      ENABLE_PROJECT_PLANNER_REAL_LLM: ${ENABLE_PROJECT_PLANNER_REAL_LLM:-false}
      # Stage 46 -- agent discussion & design review. Review-only; work-item
      # dispatch + real LLM stay OFF.
      ENABLE_DESIGN_REVIEW: ${ENABLE_DESIGN_REVIEW:-true}
      DESIGN_REVIEW_PLANNING_ONLY: ${DESIGN_REVIEW_PLANNING_ONLY:-true}
      ENABLE_DESIGN_REVIEW_WORK_ITEM_DISPATCH: ${ENABLE_DESIGN_REVIEW_WORK_ITEM_DISPATCH:-false}
      ENABLE_DESIGN_REVIEW_REAL_LLM: ${ENABLE_DESIGN_REVIEW_REAL_LLM:-false}
      # Stage 47 -- real repo workspace operator. Controlled-only; repo write /
      # GitHub write / deploy / real LLM / work-item dispatch all stay OFF.
      ENABLE_WORKSPACE_OPERATOR: ${ENABLE_WORKSPACE_OPERATOR:-true}
      WORKSPACE_OPERATOR_CONTROLLED_ONLY: ${WORKSPACE_OPERATOR_CONTROLLED_ONLY:-true}
      WORKSPACE_OPERATOR_TEMPLATE_MODE: ${WORKSPACE_OPERATOR_TEMPLATE_MODE:-true}
      ENABLE_WORKSPACE_OPERATOR_REAL_LLM: ${ENABLE_WORKSPACE_OPERATOR_REAL_LLM:-false}
      ENABLE_WORKSPACE_OPERATOR_GITHUB_WRITE: ${ENABLE_WORKSPACE_OPERATOR_GITHUB_WRITE:-false}
      ENABLE_WORKSPACE_OPERATOR_REPO_WRITE: ${ENABLE_WORKSPACE_OPERATOR_REPO_WRITE:-false}
      ENABLE_WORKSPACE_OPERATOR_DEPLOY: ${ENABLE_WORKSPACE_OPERATOR_DEPLOY:-false}
      ENABLE_WORKSPACE_OPERATOR_WORK_ITEM_DISPATCH: ${ENABLE_WORKSPACE_OPERATOR_WORK_ITEM_DISPATCH:-false}
      WORKSPACE_OPERATOR_ROOT: ${WORKSPACE_OPERATOR_ROOT:-/tmp/aiagents-workspaces}
      WORKSPACE_OPERATOR_ALLOWED_ROOTS: ${WORKSPACE_OPERATOR_ALLOWED_ROOTS:-/tmp/aiagents-workspaces}
      # Stage 48 -- mini project delivery pilot. Controlled-only; real LLM /
      # GitHub write / PR / deploy / external delivery all stay OFF.
      ENABLE_MINI_DELIVERY_PILOT: ${ENABLE_MINI_DELIVERY_PILOT:-true}
      MINI_DELIVERY_PILOT_CONTROLLED_ONLY: ${MINI_DELIVERY_PILOT_CONTROLLED_ONLY:-true}
      MINI_DELIVERY_PILOT_TEMPLATE_MODE: ${MINI_DELIVERY_PILOT_TEMPLATE_MODE:-true}
      ENABLE_MINI_DELIVERY_REAL_LLM: ${ENABLE_MINI_DELIVERY_REAL_LLM:-false}
      ENABLE_MINI_DELIVERY_GITHUB_WRITE: ${ENABLE_MINI_DELIVERY_GITHUB_WRITE:-false}
      ENABLE_MINI_DELIVERY_PR_CREATION: ${ENABLE_MINI_DELIVERY_PR_CREATION:-false}
      ENABLE_MINI_DELIVERY_DEPLOY: ${ENABLE_MINI_DELIVERY_DEPLOY:-false}
      ENABLE_MINI_DELIVERY_EXTERNAL_DELIVERY: ${ENABLE_MINI_DELIVERY_EXTERNAL_DELIVERY:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: orchestrator
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - policy-engine
      - approval-engine
      - audit-service
    volumes:
      # Stage 41 -- mount host report dirs so the orchestrator can read
      # regression summaries and DR drill reports written by verify scripts.
      - ../../source/regression-reports:/app/source/regression-reports
      - ../../source/dr-reports:/app/source/dr-reports
      # Stage 42 -- mount audit forensic + repair reports (read-only views).
      - ../../source/audit-forensics:/app/source/audit-forensics
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  communication-gateway:
    build:
      context: ../..
      dockerfile: apps/communication-gateway/Dockerfile
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      GITHUB_AUTOMATION_URL: http://github-automation:8005
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: communication-gateway
    ports:
      - "127.0.0.1:8004:8004"
    depends_on:
      - orchestrator
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  github-automation:
    build:
      context: ../..
      dockerfile: apps/github-automation/Dockerfile
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_DEFAULT_REPO: coolerh250/AI-Agents-SWD
      GITHUB_DRY_RUN: "true"
      # Stage 23 controlled-real GitHub validation. Default to OFF — only
      # set RUN_REAL_GITHUB_TEST=true + GITHUB_TEST_REPO via the shell env
      # when an operator explicitly opts in. The token value, when present,
      # is read at call time from GITHUB_TOKEN and never echoed.
      RUN_REAL_GITHUB_TEST: ${RUN_REAL_GITHUB_TEST:-false}
      GITHUB_TEST_REPO: ${GITHUB_TEST_REPO:-}
      AUDIT_SERVICE_URL: http://audit-service:8003
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: github-automation
    ports:
      - "127.0.0.1:8005:8005"
    depends_on:
      - audit-service
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  intake-agent:
    build:
      context: ../..
      dockerfile: agents/intake-agent/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: intake-agent
    ports:
      - "127.0.0.1:8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  requirement-agent:
    build:
      context: ../..
      dockerfile: agents/requirement-agent/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: requirement-agent
      # Stage 45 -- route project-scale requests to the project-planner-agent.
      ENABLE_PROJECT_PLANNER: ${ENABLE_PROJECT_PLANNER:-true}
      PROJECT_PLANNER_PLANNING_ONLY: ${PROJECT_PLANNER_PLANNING_ONLY:-true}
    ports:
      - "127.0.0.1:8011:8011"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  development-agent:
    build:
      context: ../..
      dockerfile: agents/development-agent/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: development-agent
    ports:
      - "127.0.0.1:8012:8012"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8012/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  qa-agent:
    build:
      context: ../..
      dockerfile: agents/qa-agent/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: qa-agent
    ports:
      - "127.0.0.1:8013:8013"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8013/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  devops-agent:
    build:
      context: ../..
      dockerfile: agents/devops-agent/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      AUDIT_SERVICE_URL: http://audit-service:8003
      GITHUB_AUTOMATION_URL: http://github-automation:8005
      GITHUB_DEFAULT_REPO: coolerh250/AI-Agents-SWD
      GITHUB_DRY_RUN: "true"
      GITHUB_INTEGRATION_DEFAULT: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: devops-agent
    ports:
      - "127.0.0.1:8014:8014"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8014/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  project-planner-agent:
    build:
      context: ../..
      dockerfile: agents/project-planner-agent/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: project-planner-agent
      ENABLE_PROJECT_WORK_ITEM_DISPATCH: "false"
      ENABLE_PROJECT_PLANNER_REAL_LLM: "false"
      PROJECT_PLANNER_TEMPLATE_MODE: "true"
    ports:
      - "127.0.0.1:8016:8016"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8016/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  design-review-agent:
    build:
      context: ../..
      dockerfile: agents/design-review-agent/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: design-review-agent
      DESIGN_REVIEW_TEMPLATE_MODE: "true"
      ENABLE_DESIGN_REVIEW_REAL_LLM: "false"
      DESIGN_REVIEW_PLANNING_ONLY: "true"
      ENABLE_DESIGN_REVIEW_WORK_ITEM_DISPATCH: "false"
    ports:
      - "127.0.0.1:8017:8017"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8017/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  workspace-operator-agent:
    build:
      context: ../..
      dockerfile: agents/workspace-operator-agent/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: workspace-operator-agent
      # Stage 47 -- controlled-only. No repo write, no GitHub, no deploy, no LLM.
      WORKSPACE_OPERATOR_TEMPLATE_MODE: "true"
      WORKSPACE_OPERATOR_CONTROLLED_ONLY: "true"
      ENABLE_WORKSPACE_OPERATOR: "true"
      ENABLE_WORKSPACE_OPERATOR_REAL_LLM: "false"
      ENABLE_WORKSPACE_OPERATOR_GITHUB_WRITE: "false"
      ENABLE_WORKSPACE_OPERATOR_REPO_WRITE: "false"
      ENABLE_WORKSPACE_OPERATOR_DEPLOY: "false"
      ENABLE_WORKSPACE_OPERATOR_WORK_ITEM_DISPATCH: "false"
      WORKSPACE_OPERATOR_ROOT: /tmp/aiagents-workspaces
      WORKSPACE_OPERATOR_ALLOWED_ROOTS: /tmp/aiagents-workspaces
    ports:
      - "127.0.0.1:8018:8018"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8018/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mini-delivery-pilot-agent:
    build:
      context: ../..
      dockerfile: agents/mini-delivery-pilot-agent/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: mini-delivery-pilot-agent
      # Stage 48 -- controlled-only. No real LLM, no GitHub, no PR, no deploy.
      MINI_DELIVERY_PILOT_TEMPLATE_MODE: "true"
      MINI_DELIVERY_PILOT_CONTROLLED_ONLY: "true"
      ENABLE_MINI_DELIVERY_PILOT: "true"
      ENABLE_MINI_DELIVERY_REAL_LLM: "false"
      ENABLE_MINI_DELIVERY_GITHUB_WRITE: "false"
      ENABLE_MINI_DELIVERY_PR_CREATION: "false"
      ENABLE_MINI_DELIVERY_DEPLOY: "false"
      ENABLE_MINI_DELIVERY_EXTERNAL_DELIVERY: "false"
      # the pilot runs the controlled workspace execution in-process.
      WORKSPACE_OPERATOR_ALLOWED_ROOTS: /tmp/aiagents-workspaces
      WORKSPACE_OPERATOR_ROOT: /tmp/aiagents-workspaces
    ports:
      - "127.0.0.1:8019:8019"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8019/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  retry-scheduler:
    build:
      context: ../..
      dockerfile: apps/retry-scheduler/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres@postgres:5432/aiagents
      AUDIT_SERVICE_URL: http://audit-service:8003
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: retry-scheduler
    ports:
      - "127.0.0.1:8015:8015"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8015/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yml"]
    user: "0:0"
    volumes:
      - ../observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      # Bind --web.external-url so the API self-links resolve in tests.
      - --web.external-url=http://localhost:9093
    volumes:
      - ../observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - orchestrator
      - communication-gateway
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Disable Grafana's phone-home / plugin auto-install so the local/test
      # runtime never contacts grafana.com.
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - tempo
      - alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  tempo-data:
  alertmanager-data:
