# Step 51.1 -- Runtime Dependency Matrix (Stage 53A).
#
# Each edge is backed by EVIDENCE from infra/docker-compose/docker-compose.yml
# (depends_on) and/or an explicit environment-variable service URL. Edges are
# NOT inferred from name similarity.
#
# evidence values:
#   compose_depends_on   -- listed under the service's depends_on
#   env:<VAR>            -- service URL injected via that environment variable
#
# required=true means the dependency is needed for the source to function
# (DB / governance call path). required=false means best-effort / observability
# (OTLP trace export) where the source still starts without it.

meta:
  stage: "53A"
  step: "51.1"
  composeFile: infra/docker-compose/docker-compose.yml

dependencies:
  # orchestrator
  - {source: orchestrator, target: policy-engine, protocol: http, port: 8001, required: true, purpose: policy_evaluation, evidence: "compose_depends_on + env:POLICY_ENGINE_URL"}
  - {source: orchestrator, target: approval-engine, protocol: http, port: 8002, required: true, purpose: approval_gate, evidence: "compose_depends_on + env:APPROVAL_ENGINE_URL"}
  - {source: orchestrator, target: audit-service, protocol: http, port: 8003, required: true, purpose: audit_write, evidence: "compose_depends_on + env:AUDIT_SERVICE_URL"}
  - {source: orchestrator, target: postgres, protocol: tcp, port: 5432, required: true, purpose: primary_datastore, evidence: "env:DATABASE_URL"}
  - {source: orchestrator, target: redis, protocol: tcp, port: 6379, required: true, purpose: streams_cache, evidence: "env:REDIS_URL"}
