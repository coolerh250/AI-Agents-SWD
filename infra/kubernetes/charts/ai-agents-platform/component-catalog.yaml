    service: {enabled: true, port: 8000}
    health: {enabled: true, type: httpGet, path: /health, initialDelaySeconds: 10, periodSeconds: 10}
    resources:
      requests: {cpu: 250m, memory: 256Mi}
      limits: {cpu: "1", memory: 1Gi}
    dependencies: [policy-engine, approval-engine, audit-service, postgres, redis]
    testOnly: false

