# Step 51.1 -- Kubernetes Component Catalog (Stage 53A).
#
# Derived from infra/kubernetes/runtime-inventory.yaml. Lists ONLY services that
# are candidates to become Kubernetes long-running workloads. One-shot jobs
# (migrations, backup, verification scripts) are deliberately EXCLUDED here and
# remain in runtime-inventory.yaml#oneShotJobs (deferred to Step 51.2).
#
# Image tags are step-51-1-placeholder for first-party services: NOT yet wired
# to any registry, NO real digest. Infrastructure images are real pinned
# upstream tags. This file is a catalog, not a deployable manifest.
#
# values.yaml carries the authoritative `components:` map consumed by the
# templates; this catalog is the inventory->chart bridge and classification
# record (kept in sync; tests assert completeness against the inventory).

meta:
  stage: "53A"
  step: "51.1"
  imagePlaceholderTag: step-51-1-placeholder
  registryIntegrated: false

components:
