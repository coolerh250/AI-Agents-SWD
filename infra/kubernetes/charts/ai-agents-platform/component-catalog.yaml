# Recorded but NOT packaged as Helm workloads in this chart (Step 51.1).
deferred:
  observability:
    reason: "Cluster monitoring stack (Tempo/Prometheus/Alertmanager/Grafana) treated as external/managed; out of scope for Step 51.1."
    services: [tempo, prometheus, alertmanager, grafana]
    kubernetesTarget: external_deferred
  oneShotJobs:
    reason: "Migration Job + backup CronJob are job-style workloads; deferred to Step 51.2. MUST NOT become Deployments."
    services: [database-migrations, backup-dr-run]
    kubernetesTarget: deferred_step_51_2
