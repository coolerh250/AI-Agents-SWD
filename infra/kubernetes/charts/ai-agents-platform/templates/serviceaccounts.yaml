{{/*
Step 51.1 ServiceAccount foundation. One SA per enabled component when
serviceAccount.create=true. automountServiceAccountToken defaults to false --
no Role/RoleBinding/ClusterRole is created here (Kubernetes API access is
deferred to a future stage with an explicit need).
*/}}
{{- $root := . -}}
{{- if .Values.serviceAccount.create }}
{{- range $name, $comp := .Values.components }}
{{- if $comp.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aiagents.serviceAccountName" (dict "root" $root "name" $name "comp" $comp) }}
  labels:
    {{- include "aiagents.componentLabels" (dict "root" $root "name" $name "comp" $comp) | nindent 4 }}
automountServiceAccountToken: {{ $root.Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- end }}
{{- end }}

{{/* Step 51.2C2 -- dedicated batch-job ServiceAccounts (token automount off,
     no Role/RoleBinding/ClusterRole -> zero Kubernetes API access). Rendered
     only alongside a rendered batch job (dev/test). */}}
{{- $env := .Values.global.environment -}}
{{- $fullname := include "aiagents.fullname" . -}}
{{- $bj := .Values.batchJobs -}}
{{- if and $bj.serviceAccounts.create (has $env (list "dev" "test")) }}
{{- $batchSAs := list }}
{{- if $bj.migration.renderTemplate }}{{- $batchSAs = append $batchSAs "migration" }}{{- end }}
{{- if $bj.backup.renderTemplate }}{{- $batchSAs = append $batchSAs "backup" }}{{- end }}
{{- if $bj.restore.renderTemplate }}{{- $batchSAs = append $batchSAs "restore" }}{{- end }}
{{- range $job := $batchSAs }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-{{ $job }}-job
  labels:
    {{- include "aiagents.commonLabels" $root | nindent 4 }}
    app.kubernetes.io/name: {{ $job }}-job
    app.kubernetes.io/component: batch
    ai-agents-swd/batch-job: {{ $job }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
