{{/*
Step 51.1 fail-closed validation. Emits NO Kubernetes resource; it aborts the
render (helm lint / helm template) when a safety rule is violated. The
production placeholder values satisfy every rule and therefore render safely --
but stay non-deployable (global.realDeployEnabled=false everywhere).
*/}}
{{- $g := .Values.global -}}
{{- $env := $g.environment -}}
{{- $valid := list "dev" "test" "staging" "production" -}}
{{- if not (has $env $valid) }}
  {{- fail (printf "global.environment %q must be one of dev|test|staging|production" $env) }}
{{- end }}
{{- if eq $env "production" }}
  {{- if not $g.production }}{{ fail "production environment requires global.production=true" }}{{ end }}
{{- else }}
  {{- if $g.production }}{{ fail (printf "non-production environment %q must not set global.production=true" $env) }}{{ end }}
{{- end }}
{{- if $g.realDeployEnabled }}{{ fail "global.realDeployEnabled must be false in the Step 51.1 foundation chart (no real deploy)" }}{{ end }}
{{- if .Values.secrets.create }}{{ fail "secrets.create must be false: this chart never creates a Secret resource" }}{{ end }}
{{- if $g.production }}
  {{- if .Values.platform.adminConsole.testAuthEnabled }}{{ fail "production must not enable test-local auth" }}{{ end }}
  {{- if .Values.platform.adminConsole.productionAuthEnabled }}{{ fail "production auth is not implemented; must stay false (fail closed)" }}{{ end }}
  {{- if .Values.platform.adminConsole.oidcEnabled }}{{ fail "production OIDC is not implemented; must stay false (fail closed)" }}{{ end }}
  {{- if .Values.platform.adminConsole.operatorActionsEnabled }}{{ fail "production must not enable operator actions" }}{{ end }}
  {{- if .Values.platform.integrations.githubWrite }}{{ fail "production must not enable GitHub write" }}{{ end }}
  {{- if .Values.platform.integrations.deployment }}{{ fail "production must not enable deployment actions" }}{{ end }}
  {{- if .Values.platform.integrations.externalDelivery }}{{ fail "production must not enable real external delivery" }}{{ end }}
  {{- if .Values.platform.integrations.productionBackupSchedule }}{{ fail "production must not enable production backup schedule" }}{{ end }}
  {{- if (index .Values.components "vault").enabled }}{{ fail "production must not enable in-cluster Vault dev" }}{{ end }}
  {{- if (index .Values.components "postgres").enabled }}{{ fail "production must not enable in-cluster Postgres (use external managed DB)" }}{{ end }}
  {{- if (index .Values.components "redis").enabled }}{{ fail "production must not enable in-cluster Redis (use external managed Redis)" }}{{ end }}
{{- end }}
{{- range $name, $comp := .Values.components }}
{{- if $comp.enabled }}
  {{- if eq ($comp.image.tag | toString) "latest" }}{{ fail (printf "component %s uses forbidden image tag 'latest'" $name) }}{{ end }}
  {{- if $comp.testOnly }}{{- if $g.production }}{{ fail (printf "production must not enable test-only component %s" $name) }}{{ end }}{{- end }}
{{- end }}
{{- end }}

{{/* ---- Step 51.2A workload security fail-closed ---- */}}
{{- $ws := .Values.global.workloadSecurity -}}
{{- if not $ws.enabled }}
  {{- if or (eq $env "production") (eq $env "staging") }}{{ fail (printf "%s must not disable workloadSecurity" $env) }}{{ end }}
{{- end }}
{{- if $ws.enabled }}
  {{- if not $ws.runAsNonRoot }}{{ fail "workloadSecurity.runAsNonRoot must be true" }}{{ end }}
  {{- if eq (int $ws.runAsUser) 0 }}{{ fail "workloadSecurity.runAsUser must not be 0 (root)" }}{{ end }}
  {{- if $ws.allowPrivilegeEscalation }}{{ fail "workloadSecurity.allowPrivilegeEscalation must be false" }}{{ end }}
  {{- if $ws.privileged }}{{ fail "workloadSecurity.privileged must be false" }}{{ end }}
  {{- if ne $ws.seccompProfile.type "RuntimeDefault" }}{{ fail "workloadSecurity.seccompProfile.type must be RuntimeDefault" }}{{ end }}
  {{- if not (has "ALL" $ws.dropCapabilities) }}{{ fail "workloadSecurity.dropCapabilities must include ALL" }}{{ end }}
  {{- if $ws.automountServiceAccountToken }}{{ fail "workloadSecurity.automountServiceAccountToken must be false" }}{{ end }}
{{- end }}
{{- if .Values.serviceAccount.automountServiceAccountToken }}{{ fail "serviceAccount.automountServiceAccountToken must be false" }}{{ end }}
{{- range $name, $comp := .Values.components }}
{{- if $comp.enabled }}
{{- $sec := $comp.security | default dict }}
  {{- if hasKey $sec "runAsUser" }}{{- if eq (int $sec.runAsUser) 0 }}{{ fail (printf "component %s runAsUser must not be 0" $name) }}{{ end }}{{- end }}
  {{- if hasKey $sec "capabilities" }}{{ fail (printf "component %s must not set capabilities (cap-add forbidden; baseline drops ALL)" $name) }}{{ end }}
  {{- if hasKey $sec "hostPath" }}{{ fail (printf "component %s must not use hostPath" $name) }}{{ end }}
  {{- if hasKey $sec "privileged" }}{{ fail (printf "component %s must not override privileged" $name) }}{{ end }}
  {{- if hasKey $sec "allowPrivilegeEscalation" }}{{ fail (printf "component %s must not override allowPrivilegeEscalation" $name) }}{{ end }}
  {{- range $w := ($sec.writablePaths | default list) }}
    {{- if not (hasPrefix "/" $w.mountPath) }}{{ fail (printf "component %s writable path %q must be absolute" $name $w.mountPath) }}{{ end }}
    {{- if eq $w.mountPath "/" }}{{ fail (printf "component %s must not mount writable /" $name) }}{{ end }}
    {{- if eq $w.mountPath "/app" }}{{ fail (printf "component %s must not mount writable /app" $name) }}{{ end }}
    {{- if eq $w.mountPath "/etc" }}{{ fail (printf "component %s must not mount writable /etc" $name) }}{{ end }}
    {{- if contains "docker.sock" $w.mountPath }}{{ fail (printf "component %s must not mount the docker socket" $name) }}{{ end }}
    {{- if not $w.sizeLimit }}{{ fail (printf "component %s writable path %q must set sizeLimit" $name $w.mountPath) }}{{ end }}
  {{- end }}
{{- end }}
{{- end }}

{{/* ---- Step 51.2B network policy fail-closed ---- */}}
{{- $np := .Values.networkPolicy -}}
{{- if not $np.enabled }}{{ fail "networkPolicy.enabled must be true (default-deny baseline)" }}{{ end }}
{{- if not $np.defaultDenyIngress }}{{ fail "networkPolicy.defaultDenyIngress must be true" }}{{ end }}
{{- if not $np.defaultDenyEgress }}{{ fail "networkPolicy.defaultDenyEgress must be true" }}{{ end }}
{{- if not $np.dns.enabled }}{{ fail "networkPolicy.dns must be enabled" }}{{ end }}
{{- if eq (len $np.dns.namespaceSelector) 0 }}{{ fail "networkPolicy.dns.namespaceSelector must not be empty" }}{{ end }}
{{- if eq (len $np.dns.podSelector) 0 }}{{ fail "networkPolicy.dns.podSelector must not be empty" }}{{ end }}
{{- range $p := $np.dns.ports }}{{- if ne (int $p.port) 53 }}{{ fail "networkPolicy.dns ports must be 53 only" }}{{ end }}{{- end }}
{{- if $np.externalEgress.enabled }}{{ fail "networkPolicy.externalEgress must be disabled in this baseline" }}{{ end }}
{{- if $np.ingressController.enabled }}
  {{- if eq (len $np.ingressController.namespaceSelector) 0 }}{{ fail "ingressController.namespaceSelector must not be empty when enabled" }}{{ end }}
  {{- if eq (len $np.ingressController.podSelector) 0 }}{{ fail "ingressController.podSelector must not be empty when enabled" }}{{ end }}
  {{- if eq (len $np.ingressController.ports) 0 }}{{ fail "ingressController.ports must be set when enabled" }}{{ end }}
  {{- range $port := $np.ingressController.ports }}{{- if ne (int $port) 8000 }}{{ fail "ingressController port must equal the orchestrator service port (8000)" }}{{ end }}{{- end }}
  {{- if $g.production }}{{ fail "production must not enable the ingress-controller policy" }}{{ end }}
{{- end }}
{{- range $svcName, $svc := .Values.externalDataServices }}
  {{- range $cidr := ($svc.cidrs | default list) }}
    {{- if or (eq $cidr "0.0.0.0/0") (eq $cidr "::/0") }}{{ fail (printf "externalDataServices.%s must not use an unrestricted CIDR" $svcName) }}{{ end }}
  {{- end }}
  {{- if and $g.production $svc.enabled }}{{ fail (printf "production must not enable the external %s data service in this stage" $svcName) }}{{ end }}
{{- end }}
{{- if $g.production }}
  {{- if $np.observability.otlpExport.enabled }}{{ fail "production must not enable OTLP export" }}{{ end }}
  {{- if $np.observability.prometheusScrape.enabled }}{{ fail "production must not enable prometheus external scrape" }}{{ end }}
{{- end }}

{{/* ---- Step 51.2C1 storage fail-closed ---- */}}
{{- $st := .Values.storage -}}
{{- if not $st.enabled }}{{ fail "storage.enabled must be true (storage baseline)" }}{{ end }}
{{- $badSC := list "gp2" "gp3" "standard" "premium-rwo" "managed-premium" "managed-csi" "ebs-sc" "do-block-storage" "csi-cinder" "nfs-client" "longhorn" "openebs-hostpath" "local-path" "azurefile" "azuredisk" "pd-ssd" "pd-standard" "efs-sc" -}}
{{- $sampleClaims := list "sample" "default" "placeholder" "changeme" "todo" "my-claim" "example" "aiagents-sample" -}}
{{- $forbiddenMounts := list "/" "/app" "/etc" "/bin" "/sbin" "/usr" "/proc" "/sys" "/dev" -}}
{{- range $key := (list "postgres" "redis") }}
{{- $s := index $st $key }}
  {{- if and (eq $s.strategy "generatedPVC") (or (eq $env "production") (eq $env "staging")) }}{{ fail (printf "%s must not use generatedPVC for %s (use externalService)" $env $key) }}{{ end }}
  {{- if and (eq $s.strategy "generatedPVC") (ne $s.accessMode "ReadWriteOnce") }}{{ fail (printf "%s generatedPVC must use ReadWriteOnce" $key) }}{{ end }}
  {{- if and (eq $s.accessMode "ReadWriteMany") (eq $s.strategy "generatedPVC") }}{{ fail (printf "%s ReadWriteMany requires existingClaim, not generatedPVC" $key) }}{{ end }}
  {{- if and (eq $s.strategy "existingClaim") $s.persistenceEnabled (eq (trim ($s.existingClaim | default "")) "") }}{{ fail (printf "%s existingClaim strategy requires a non-empty claim name" $key) }}{{ end }}
  {{- if and (hasKey $s "storageClassName") (has (lower ($s.storageClassName | default "")) $badSC) }}{{ fail (printf "%s must not use a real-looking storage class %q" $key $s.storageClassName) }}{{ end }}
  {{- if hasKey $s "mountPath" }}
    {{- if not (hasPrefix "/" $s.mountPath) }}{{ fail (printf "%s mountPath must be absolute" $key) }}{{ end }}
    {{- range $m := $forbiddenMounts }}{{- if eq $s.mountPath $m }}{{ fail (printf "%s must not mount %q" $key $m) }}{{ end }}{{- end }}
    {{- if contains "docker.sock" $s.mountPath }}{{ fail (printf "%s must not mount the docker socket" $key) }}{{ end }}
  {{- end }}
{{- end }}
{{- range $key := (list "workspace" "artifacts") }}
{{- $s := index $st $key }}
  {{- if and (eq ($s.accessMode | default "") "ReadWriteMany") (eq $s.strategy "generatedPVC") }}{{ fail (printf "%s ReadWriteMany requires existingClaim" $key) }}{{ end }}
  {{- if and (eq $s.strategy "existingClaim") $s.persistenceEnabled (eq (trim ($s.existingClaim | default "")) "") }}{{ fail (printf "%s existingClaim requires a non-empty claim name" $key) }}{{ end }}
  {{- if and (hasKey $s "storageClassName") (has (lower ($s.storageClassName | default "")) $badSC) }}{{ fail (printf "%s must not use a real-looking storage class %q" $key $s.storageClassName) }}{{ end }}
{{- end }}
{{- if $st.workspace.productionConfigured }}
  {{- if ne $st.workspace.strategy "existingClaim" }}{{ fail "workspace productionConfigured=true requires an existingClaim strategy" }}{{ end }}
  {{- if eq (trim ($st.workspace.existingClaim | default "")) "" }}{{ fail "workspace productionConfigured=true requires a non-empty existingClaim" }}{{ end }}
  {{- if has (lower ($st.workspace.existingClaim | default "")) $sampleClaims }}{{ fail "workspace existingClaim must not be a sample/default claim name" }}{{ end }}
{{- end }}
{{- if $st.artifacts.productionConfigured }}{{ fail "artifacts productionConfigured=true is not supported in this stage (no external object store configured)" }}{{ end }}

{{/* ---- Step 51.2C2 batch-job fail-closed ---- */}}
{{- $bj := .Values.batchJobs -}}
{{- $nondev := or (eq $env "production") (eq $env "staging") -}}
{{- $m := $bj.migration -}}
{{- $b := $bj.backup -}}
{{- $r := $bj.restore -}}
{{/* (1-4) no batch operation may render/execute in staging/production */}}
{{- if $nondev }}
  {{- if $m.renderTemplate }}{{ fail (printf "%s must not render a migration Job" $env) }}{{ end }}
  {{- if $b.renderTemplate }}{{ fail (printf "%s must not render a backup CronJob" $env) }}{{ end }}
  {{- if $r.renderTemplate }}{{ fail (printf "%s must not render a restore Job" $env) }}{{ end }}
  {{- if $m.executionEnabled }}{{ fail (printf "%s must not enable migration execution" $env) }}{{ end }}
  {{- if $b.scheduleEnabled }}{{ fail (printf "%s must not enable backup schedule" $env) }}{{ end }}
  {{- if $r.executionEnabled }}{{ fail (printf "%s must not enable restore execution" $env) }}{{ end }}
{{- end }}
{{/* (5-8) baseline execution gates */}}
{{- if $m.executionEnabled }}{{ fail "migration.executionEnabled must be false in this baseline" }}{{ end }}
{{- if $b.scheduleEnabled }}{{ fail "backup.scheduleEnabled must be false in this baseline" }}{{ end }}
{{- if not $b.suspend }}{{ fail "backup CronJob must be suspended (suspend=true)" }}{{ end }}
{{- if $r.executionEnabled }}{{ fail "restore.executionEnabled must be false (critical op)" }}{{ end }}
{{- if $r.renderTemplate }}{{- if $nondev }}{{ fail "restore Job must never render outside a dev/test fixture" }}{{ end }}{{- end }}
{{/* (9) backup schedule cannot be enabled without a configured target */}}
{{- if and $b.scheduleEnabled (eq $b.target.strategy "disabled") }}{{ fail "backup schedule cannot be enabled while the artifact target is disabled" }}{{ end }}
{{/* (16-19) job timing/retry policy */}}
{{- range $jn, $j := (dict "migration" $m "backup" $b "restore" $r) }}
  {{- if gt (int $j.backoffLimit) 0 }}{{ fail (printf "%s backoffLimit must be 0" $jn) }}{{ end }}
  {{- if not $j.activeDeadlineSeconds }}{{ fail (printf "%s must set activeDeadlineSeconds" $jn) }}{{ end }}
  {{- if not $j.ttlSecondsAfterFinished }}{{ fail (printf "%s must set ttlSecondsAfterFinished" $jn) }}{{ end }}
{{- end }}
{{- if ne $b.concurrencyPolicy "Forbid" }}{{ fail "backup concurrencyPolicy must be Forbid" }}{{ end }}
{{/* (13-15) fixed commands only -- no shell, no command/args from free-form values */}}
{{- range $ck, $cmd := .Values.batchCommands }}
  {{- if $cmd.shell }}{{ fail (printf "batchCommands.%s.shell must be false" $ck) }}{{ end }}
  {{- if eq (len $cmd.command) 0 }}{{ fail (printf "batchCommands.%s.command must be fixed/non-empty" $ck) }}{{ end }}
  {{- range $a := $cmd.args }}
    {{- if or (eq $a "-c") (contains "$(" $a) (contains "&&" $a) (contains ";" $a) }}{{ fail (printf "batchCommands.%s args must not contain shell constructs" $ck) }}{{ end }}
  {{- end }}
{{- end }}
{{/* commandKey must reference a catalogued command */}}
{{- range $jn, $key := (dict "migration" $m.commandKey "backup" $b.commandKey "restore" $r.commandKey) }}
  {{- if not (hasKey $.Values.batchCommands $key) }}{{ fail (printf "%s commandKey %q has no batchCommands entry" $jn $key) }}{{ end }}
{{- end }}
{{/* (20-21) restore target isolation */}}
{{- if ne $r.targetPrefix "aiagents_restore_drill_" }}{{ fail "restore.targetPrefix must be aiagents_restore_drill_" }}{{ end }}
{{/* (26) backup target must not reuse an active workspace/database PVC */}}
{{- if and (eq $b.target.strategy "existingClaim") (or (eq $b.target.existingClaim "postgres-data") (eq $b.target.existingClaim "redis-data")) }}{{ fail "backup target must not reuse an active datastore PVC" }}{{ end }}
