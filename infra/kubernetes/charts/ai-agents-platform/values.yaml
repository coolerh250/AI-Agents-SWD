    # Override: test-only dev vault (never deployed). Official vault UID 100.
    # read-only root OFF. Baseline drops ALL capabilities -- a deployed dev vault
    # would need VAULT_DISABLE_MLOCK (compose grants IPC_LOCK; cap-add is forbidden
    # by the baseline). Test-only; not deployed.
    security:
      runAsUser: 100
      runAsGroup: 1000
      readOnlyRootFilesystem: false
      writablePaths: []
    containerPort: 8200
    command: ["server", "-dev"]
    service: {enabled: true, port: 8200}
    health: {enabled: false, type: httpGet, path: /v1/sys/health, initialDelaySeconds: 10, periodSeconds: 10}
    resources:
      requests: {cpu: 50m, memory: 64Mi}
      limits: {cpu: 250m, memory: 256Mi}
    useCommonSecretRefs: false
    env:
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
