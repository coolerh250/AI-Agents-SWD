# Step 51.1 -- base values for the ai-agents-platform FOUNDATION chart.
#
# Defaults are safe/non-production. Environment files (values-dev/test/
# staging-placeholder/prod-placeholder.yaml) override `global`, the platform
# toggles, and infrastructure component `enabled` flags.
#
# This file contains NO secret values. Credentials are referenced only by
# existing-Secret name + key (secretRefs); the chart never creates a Secret.

global:
  environment: dev          # dev | test | staging | production
  production: false
  realDeployEnabled: false  # foundation chart NEVER deploys; stays false everywhere
  imageRegistry: ""         # optional registry prefix; empty = placeholder/no registry
  imagePullSecrets: []
  nameOverride: ""

  # Step 51.2A -- restricted workload security baseline. Applied to every enabled
  # component; per-component `security` blocks may override only runAsUser/Group,
  # fsGroup, readOnlyRootFilesystem and writablePaths. runAsNonRoot, seccomp,
  # privilege escalation, privileged, dropped capabilities and token automount
  # are NOT component-overridable (no privileged/root/cap-add escape hatch).
  workloadSecurity:
    enabled: true
    profile: restricted-baseline
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
    allowPrivilegeEscalation: false
    privileged: false
    readOnlyRootFilesystem: true
    dropCapabilities:
      - ALL
    automountServiceAccountToken: false

# Non-secret platform configuration surfaced into a shared ConfigMap.
platform:
  adminConsole:
    enabled: true
    authMode: test_local_signed_session
    testAuthEnabled: true
    productionAuthEnabled: false
    oidcEnabled: false
    operatorActionsEnabled: true
    operatorActionsControlledOnly: true
  integrations:
    githubWrite: false
    prCreation: false
    deployment: false
    realLlm: false
    externalDelivery: false
    productionBackupSchedule: false

# Secret model: reference an EXISTING secret only. The chart does NOT create it.
secrets:
  existingSecret: aiagents-runtime-secrets
  create: false             # MUST stay false in this chart (no Secret resource)

serviceAccount:
  create: true
  automountServiceAccountToken: false

# Defaults applied to every component unless overridden.
defaults:
  replicas: 1
  terminationGracePeriodSeconds: 30
  strategy:
    type: RollingUpdate
    maxSurge: 1
    maxUnavailable: 0
  # Step 51.2A -- SecurityContext is now driven by global.workloadSecurity (above)
  # and per-component `security` overrides; these legacy toggles are removed.

# Shared secret reference applied to components that talk to Postgres/Redis.
# secretRefs[].keys maps SECRET KEY -> ENV VAR NAME (no values, ever).
commonSecretRefs:
  - name: aiagents-runtime-secrets
    keys:
      databaseUrl: DATABASE_URL
      redisUrl: REDIS_URL

# Step 51.2B -- NetworkPolicy & service connectivity (default-deny baseline).
# internalEdges mirror infra/kubernetes/network-connectivity-catalog.yaml (which
# is derived from the dependency matrix); the topology verifier asserts they match.
networkPolicy:
  enabled: true
  defaultDenyIngress: true
  defaultDenyEgress: true
  dns:
    enabled: true
    namespaceSelector:
      kubernetes.io/metadata.name: kube-system
    podSelector:
      k8s-app: kube-dns
    ports:
      - {protocol: UDP, port: 53}
      - {protocol: TCP, port: 53}
  ingressController:
    enabled: false
    namespaceSelector: {}
    podSelector: {}
    ports: []
  observability:
    prometheusScrape:
      enabled: false
    otlpExport:
      enabled: false
  externalEgress:
    enabled: false
  # Internal component-to-component edges (TCP). infra=true edges target the
  # in-cluster postgres/redis and only render where that component is enabled.
  internalEdges:
    - {source: orchestrator, target: policy-engine, protocol: TCP, port: 8001, required: true, infra: false}
    - {source: orchestrator, target: approval-engine, protocol: TCP, port: 8002, required: true, infra: false}
    - {source: orchestrator, target: audit-service, protocol: TCP, port: 8003, required: true, infra: false}
    - {source: orchestrator, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: orchestrator, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: approval-engine, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: approval-engine, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: audit-service, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: audit-service, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: communication-gateway, target: orchestrator, protocol: TCP, port: 8000, required: true, infra: false}
    - {source: communication-gateway, target: github-automation, protocol: TCP, port: 8005, required: false, infra: false}
    - {source: communication-gateway, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: communication-gateway, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: github-automation, target: audit-service, protocol: TCP, port: 8003, required: true, infra: false}
    - {source: github-automation, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: discord-gateway, target: communication-gateway, protocol: TCP, port: 8004, required: true, infra: false}
    - {source: discord-gateway, target: orchestrator, protocol: TCP, port: 8000, required: true, infra: false}
    - {source: discord-gateway, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: discord-gateway, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: audit-worker, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: audit-worker, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: notification-worker, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: notification-worker, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: notification-worker, target: orchestrator, protocol: TCP, port: 8000, required: false, infra: false}
    - {source: retry-scheduler, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: retry-scheduler, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: retry-scheduler, target: audit-service, protocol: TCP, port: 8003, required: false, infra: false}
    - {source: intake-agent, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: intake-agent, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: requirement-agent, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: requirement-agent, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: development-agent, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: development-agent, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: qa-agent, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: qa-agent, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: devops-agent, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: devops-agent, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: devops-agent, target: audit-service, protocol: TCP, port: 8003, required: false, infra: false}
    - {source: devops-agent, target: github-automation, protocol: TCP, port: 8005, required: false, infra: false}
    - {source: project-planner-agent, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: project-planner-agent, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: design-review-agent, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: design-review-agent, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: workspace-operator-agent, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: workspace-operator-agent, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: mini-delivery-pilot-agent, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: mini-delivery-pilot-agent, target: redis, protocol: TCP, port: 6379, required: true, infra: true}
    - {source: delivery-package-agent, target: postgres, protocol: TCP, port: 5432, required: true, infra: true}
    - {source: delivery-package-agent, target: redis, protocol: TCP, port: 6379, required: true, infra: true}

