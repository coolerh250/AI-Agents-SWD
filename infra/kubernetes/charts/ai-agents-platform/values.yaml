    # Keeps runAsNonRoot + drop ALL + no-privesc + RuntimeDefault + automount=false.
    security:
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
      readOnlyRootFilesystem: false
      writablePaths: []
    containerPort: 5432
    service: {enabled: true, port: 5432}
    health:
      enabled: true
      type: exec
      command: ["pg_isready", "-U", "postgres"]
      initialDelaySeconds: 10
      periodSeconds: 10
    resources:
      requests: {cpu: 100m, memory: 256Mi}
      limits: {cpu: 500m, memory: 1Gi}
    useCommonSecretRefs: false
    env:
      POSTGRES_USER: postgres
      POSTGRES_DB: aiagents
      POSTGRES_HOST_AUTH_METHOD: trust

  redis:
    enabled: false
    type: infrastructure
    image: {repository: redis, tag: "7", digest: ""}
    # Override: official image UID/GID; read-only root ON with writable /data
    # (ephemeral in dev/test; persistence deferred to Step 51.2C).
    security:
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
      readOnlyRootFilesystem: true
      writablePaths:
        - {name: data, mountPath: /data, sizeLimit: 256Mi}
    containerPort: 6379
    service: {enabled: true, port: 6379}
    health:
      enabled: true
      type: exec
      command: ["redis-cli", "ping"]
      initialDelaySeconds: 10
      periodSeconds: 10
    resources:
      requests: {cpu: 50m, memory: 64Mi}
      limits: {cpu: 250m, memory: 256Mi}
    useCommonSecretRefs: false
    env: {}

  vault:
    enabled: false
    type: infrastructure
    testOnly: true
    image: {repository: hashicorp/vault, tag: "1.17", digest: ""}
    # Override: test-only dev vault (never deployed). Official vault UID 100.
    # read-only root OFF. Baseline drops ALL capabilities -- a deployed dev vault
    # would need VAULT_DISABLE_MLOCK (compose grants IPC_LOCK; cap-add is forbidden
    # by the baseline). Test-only; not deployed.
    security:
      runAsUser: 100
      runAsGroup: 1000
      readOnlyRootFilesystem: false
      writablePaths: []
    containerPort: 8200
    command: ["server", "-dev"]
    service: {enabled: true, port: 8200}
    health: {enabled: false, type: httpGet, path: /v1/sys/health, initialDelaySeconds: 10, periodSeconds: 10}
    resources:
      requests: {cpu: 50m, memory: 64Mi}
      limits: {cpu: 250m, memory: 256Mi}
    useCommonSecretRefs: false
    env:
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
