# One-shot / job-style work that is NOT a compose service today and is
# explicitly excluded from the Deployment set. Recorded so it is not lost,
# but NOT turned into a Deployment in this stage.
oneShotJobs:
  - name: database-migrations
    runtimeMode: one_shot
    evidence: "migrations/*.sql applied via `docker exec -i ... psql ... < migrations/NNN.sql`; no compose service."
    kubernetesTarget: deferred_migration_job_step_51_2
    notes: ["Must become a Helm pre-install/pre-upgrade Job in Step 51.2 -- NOT a Deployment."]
  - name: backup-dr-run
    runtimeMode: one_shot
    evidence: "shared/sdk/backup_dr/cli.py run-all + scripts/run_encrypted_backup.sh; host-run, no compose service."
    kubernetesTarget: deferred_backup_cronjob_step_51_2
    notes: ["Backup CronJob deferred to Step 51.2; must stay disabled for production placeholder."]
  - name: verification-scripts
    runtimeMode: one_shot
    evidence: "scripts/verify_*.sh + run_full_regression.sh; CI/operator-run, no compose service."
    kubernetesTarget: not_a_workload
    notes: ["Operator/CI tooling; never a Deployment."]
