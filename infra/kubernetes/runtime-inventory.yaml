# Step 51.1 -- Runtime Inventory (Stage 53A).
#
# Source of truth: infra/docker-compose/docker-compose.yml (project
# aiagents-test) cross-checked against apps/*, agents/*, shared/sdk/* source.
# Every long-running FastAPI service exposes /health and /metrics via
# shared.sdk.observability.metrics.install_metrics_endpoint (verified in all
# 20 build services' main.py) and the compose healthcheck confirms the port.
#
# This file records NAMES and CLASSIFICATION only. It MUST NOT contain real
# secret values -- secretReferences list environment-variable NAMES only.
#
# It is descriptive inventory, not a deployable manifest. No cluster, no
# kubectl, no Helm install is implied by this file.

meta:
  stage: "53A"
  step: "51.1"
  composeProject: aiagents-test
  composeFile: infra/docker-compose/docker-compose.yml
  generated: "Step 51.1 baseline (manual inventory, evidence-backed)"

services:
  # ---- core application ----
  - name: orchestrator
    type: core_application
    sourcePath: apps/orchestrator
    dockerfile: apps/orchestrator/Dockerfile
    composeService: orchestrator
    runtimeMode: long_running
    port: 8000
    healthPath: /health
    metricsPath: /metrics
    longRunning: true
    testOnly: false
    kubernetesTarget: deployment
    dependencies: [policy-engine, approval-engine, audit-service, postgres, redis, tempo]
    persistence:
      required: false
      currentType: bind_mount_reports_read_only
    environmentVariables:
      - REDIS_URL
      - DATABASE_URL
      - POLICY_ENGINE_URL
      - APPROVAL_ENGINE_URL
      - AUDIT_SERVICE_URL
      - ENABLE_ADMIN_CONSOLE_V1
      - ADMIN_CONSOLE_AUTH_MODE
      - ENABLE_ADMIN_CONSOLE_OPERATOR_ACTIONS
      - OTEL_EXPORTER_OTLP_ENDPOINT
    secretReferences:
      - DATABASE_URL
      - GITHUB_TOKEN
      - DISCORD_BOT_TOKEN
      - AUDIT_HMAC_KEY
      - AUDIT_HMAC_KEY_ID
    notes:
      - "Serves Admin Console at /admin (no separate console service)."
      - "Bind-mounts source/regression-reports, dr-reports, audit-forensics read views; K8s storage deferred to Step 51.2."

