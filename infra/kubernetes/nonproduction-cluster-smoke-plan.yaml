# Step 55 (Stage 57A) -- non-production Kubernetes runtime smoke plan.
# Defines the safe, non-production smoke that takes the Step 51 static baseline to a
# real non-production cluster. NO production cluster / namespace / deploy / ArgoCD
# sync / ingress / LoadBalancer / destructive job. Smoke runs ONLY when the
# preflight confirms a safe non-production cluster; otherwise the run is BLOCKED
# (never faked).
version: "1"
meta:
  stage: "57A"
  step: "55"

nonProductionRuntimeSmoke:
  status: framework_ready
  productionReady: false
  productionExecuted: false
  requiresSafeCluster: true

  # Preflight gate -- all must hold before any install.
  preflight:
    requires:
      - kubectl_available
      - kubeconfig_present
      - reachable_cluster
      - non_production_context
      - namespace_create_or_exists
      - can_create_namespaced_workloads
    forbidden:
      - production_context
      - production_namespace
      - cluster_admin_creation
      - default_namespace_deploy
    onUnsafeOrMissing: blocked_no_safe_cluster

  # Ordered smoke steps (each has its own verifier + marker).
  steps:
    - {id: preflight, marker: NONPROD_CLUSTER_PREFLIGHT_VERIFY}
    - {id: namespace, marker: NONPROD_NAMESPACE_PLAN_VERIFY}
    - {id: helm, marker: NONPROD_HELM_RUNTIME_SMOKE_VERIFY}
    - {id: pod_startup, marker: NONPROD_POD_STARTUP_SMOKE_VERIFY}
    - {id: service_health, marker: NONPROD_SERVICE_HEALTH_SMOKE_VERIFY}
    - {id: connectivity, marker: NONPROD_SERVICE_CONNECTIVITY_SMOKE_VERIFY}
    - {id: networkpolicy, marker: NONPROD_NETWORKPOLICY_SMOKE_VERIFY}
    - {id: storage, marker: NONPROD_STORAGE_SMOKE_VERIFY}
    - {id: securitycontext, marker: NONPROD_SECURITYCONTEXT_SMOKE_VERIFY}
    - {id: batch_jobs, marker: NONPROD_BATCH_JOB_SMOKE_VERIFY}
    - {id: report, marker: NONPROD_RUNTIME_SMOKE_REPORT_VERIFY}

  inputs:
    step_51_static_baseline: infra/kubernetes/runtime-baseline-summary.yaml
    step_53_secret_reference_foundation: infra/secrets/secret-inventory.yaml
    step_54_security_image_sbom_baseline: infra/security/security-integrated-summary.yaml
    helm_chart: infra/kubernetes/charts/ai-agents-platform
    smoke_values: infra/kubernetes/charts/ai-agents-platform/values-nonprod-smoke.yaml
    namespace_plan: infra/kubernetes/nonproduction-namespace-plan.yaml

  # Hard non-actions for this stage (also enforced by the runner + verifiers).
  forbiddenActions:
    - production_deploy
    - production_namespace
    - argocd_sync
    - github_write
    - pr_creation
    - image_push
    - registry_login
    - production_secret_injection
    - production_oidc
    - production_backup_or_restore
    - public_ingress
    - loadbalancer
    - cluster_role_or_binding_creation
    - clusterwide_crd_install
    - destructive_job
    - kubeconfig_or_token_commit

  blockedOutcome:
    marker: NONPRODUCTION_KUBERNETES_RUNTIME_SMOKE_VERIFY
    value: BLOCKED_NO_SAFE_CLUSTER
    rationale: "No safe non-production cluster (kubectl/kubeconfig absent or unsafe context); framework ready, smoke not executed, never faked."

  requiredNextSteps:
    - step_56_real_argocd_nonproduction_manual_sync
    - step_60_production_readiness_review
